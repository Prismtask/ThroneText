# monster_girls.yaml – complete with all dialogue
goblin_girl:
  name: Goblin Girl
  race: Goblin
  level: 2
  base_hp: 14
  mods:
    Dexterity: 2
    Charisma: 1
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} shuffles back nervously, clutching her hands. 'U-um... I don't really know you that well yet... Can we talk more first?'
    recruit_accepted: The {name}'s eyes light up as she grabs your sleeve. 'Really? You'll take me with you? I'll try my best, I promise!'
    capture: The {name} blushes deeply and shyly steps into your arms...
    house_talk_low: The {name} fidgets with her fingers. 'S-so... what do you want? I'm not very good at talking...'
    house_talk_mid: The {name} smiles nervously. 'Oh! You're back! I was just polishing my lucky coin. Wanna see?'
    house_talk_high: The {name} giggles and grabs your hand. 'Hehe, you always know how to make me smile. Tell me a story?'
    house_talk_max: The {name} curls up beside you, resting her head on your shoulder. 'I feel so safe when you're here... I wish I could stay like this forever.'
    house_gift_love: The {name} gasps, clutching the gift to her chest. 'For me?! Oh, I love it! Thank you, thank you!'
    house_gift_hate: The {name} forces a weak smile. 'Oh... uh... thanks, I guess? Maybe I can trade it for something else...'
    house_buff: The {name} closes her eyes and whispers a small incantation. 'There! A little luck from me to you – don't waste it!'
    house_bond_kiss: The {name} stands on tiptoe and pecks your cheek, then hides her face. 'Ehehe... I've wanted to do that for so long.'
    house_recruit_again: The {name} jumps up, grabbing your arm. 'You're back for me! I knew you'd come! Let's go!'

harpy_scout:
  name: Harpy Scout
  race: Beast
  level: 5
  base_hp: 27
  mods:
    Dexterity: 3
    Charisma: 1
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} ruffles her feathers and turns her head away. 'Hmph. A sky-rider like me doesn't follow just anyone. Prove yourself first.'
    recruit_accepted: The {name} spreads her wings with a sharp cry. 'A worthy wind-mate! I'll scout the skies for you — none shall sneak past!'
    capture: The {name} squawks in surprise, then softens as she lands beside you. 'Fine... but only because you're quick, {player}.'
    house_talk_low: The {name} preens her wing, not looking at you. 'Oh, it's you. What do you want, groundling?'
    house_talk_mid: She ruffles her feathers, a hint of a smile. 'You're not as clumsy as you look. Want to hear about the clouds I saw today?'
    house_talk_high: She chirps happily, hopping closer. 'The wind told me you were coming! Let's fly together – I'll show you the world from above!'
    house_talk_max: She nuzzles your neck, wings half‑spread. 'You are my sky. I never want to land again.'
    house_gift_love: She squawks with delight, snatching the gift. 'For me?! Oh, it's perfect! I'll wear it on my wing!'
    house_gift_hate: She tilts her head, confused. 'Uh... what is this? I can't eat it or fly with it...'
    house_buff: She breathes a warm gust of wind over you. 'There – a tailwind for your journey. Use it well!'
    house_bond_kiss: She leans in, brushing her beak against your cheek. 'A kiss from the skies – now you're marked as mine.'
    house_recruit_again: She spreads her wings, eyes gleaming. 'Ready for another adventure? I've been itching to fly!'

alraune_fledger:
  name: Alraune Fledger
  race: Fey
  level: 7
  base_hp: 40
  mods:
    Charisma: 3
    Learning: 1
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} tilts her flower-crown curiously, petals closing slightly. 'The soil between us is still thin... Water it more, traveller.'
    recruit_accepted: The {name} blooms radiantly, sweet pollen drifting around you. 'Our roots have intertwined. I shall bloom beside you, always.'
    capture: The {name} releases a sweet fragrance, petals folding around your hand gently. 'You... may tend to me, {player}.'
    house_talk_low: The {name} rustles her leaves, eyes half‑closed. 'You are a stranger in my garden. Speak softly.'
    house_talk_mid: She offers you a small blossom. 'I grew this for you. It smells like friendship – do you like it?'
    house_talk_high: She wraps a vine around your wrist, pulling you close. 'My petals open only for you now. Stay a while?'
    house_talk_max: She rests her head on your chest, fragrant and warm. 'I have woven my roots into your heart. Never leave me.'
    house_gift_love: She radiates warmth, petals unfurling. 'Such a beautiful offering! I will treasure it forever.'
    house_gift_hate: She shrinks back, leaves drooping. 'Oh... this doesn't suit me at all. Please take it back.'
    house_buff: She sprinkles golden pollen over you. 'May your steps be light and your harvest plentiful.'
    house_bond_kiss: She leans forward, pressing her lips to yours – soft as petals. 'Now we are bound, root and stem.'
    house_recruit_again: She extends a leafy hand, smiling. 'The forest calls us. Let us walk together again.'

kobold_tinkerer:
  name: Kobold Tinkerer
  race: Dragonkin
  level: 8
  base_hp: 45
  mods:
    Dexterity: 3
    Learning: 2
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} hides a small gadget behind her back, tail flicking. 'Wh-what? No. I barely know you. You might break my stuff!'
    recruit_accepted: The {name} pulls out a tiny device and presses it into your palm. 'Here! My best prototype. Now we can tinker together — partners!'
    capture: The {name} drops her gadgets, tail wagging despite herself. 'D-don't break anything, okay {player}?'
    house_talk_low: She fumbles with a gear, avoiding your eyes. 'Um... I'm busy. You can watch if you don't touch anything.'
    house_talk_mid: She shows you a new contraption, eyes bright. 'Look! I made it spin faster! Wanna see how it works?'
    house_talk_high: She bounces on her heels, talking a mile a minute. 'You're the best listener! I have so many ideas – let's build something together!'
    house_talk_max: She curls up against you, holding a tiny clockwork heart. 'I made this for you. It ticks in time with mine.'
    house_gift_love: She squeals, examining the gift from every angle. 'This is AMAZING! I can use it in my next invention!'
    house_gift_hate: She stares at it, puzzled. 'Uh... what does it do? It doesn't even have gears...'
    house_buff: She taps your forehead with a wrench. 'There! A boost of inspiration – your mind will work faster now.'
    house_bond_kiss: She hesitates, then plants a quick kiss on your nose. 'T-that was a spark! See? Sparks are good!'
    house_recruit_again: She straps on her toolbelt, grinning. 'Time to tinker and fight! I've got new gadgets to test!'

dryad_protector:
  name: Dryad Protector
  race: Fey
  level: 9
  base_hp: 50
  mods:
    Charisma: 2
    Wisdom: 2
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} steps behind a tree, leaves rustling. 'You are but a stranger passing through my grove. The forest does not trust lightly.'
    recruit_accepted: The {name} takes your hand, bark-soft skin warm against yours. 'The ancient trees whisper your name with favor. I will guard you as I guard them.'
    capture: The {name} emerges from the bark, vines wrapping your wrist softly. 'The forest... allows you, {player}.'
    house_talk_low: She stays half‑hidden behind a trunk. 'You have not earned my leaves yet. Speak, but do not touch.'
    house_talk_mid: She steps closer, a twig snapping underfoot. 'You are not as loud as the others. I... can listen.'
    house_talk_high: She touches your cheek, bark‑rough but gentle. 'You are like sunlight through the canopy. Stay a while.'
    house_talk_max: She wraps her arms around you, leaves rustling with affection. 'You are my tree, my roots, my home.'
    house_gift_love: She accepts it with a reverent bow. 'The forest thanks you. I thank you. It will grow in my heart.'
    house_gift_hate: She pushes it back gently. 'This does not belong among the trees. Take it away.'
    house_buff: She traces a rune on your palm with a twig. 'May the earth shield you and the branches guide you.'
    house_bond_kiss: She presses her lips to yours – cool, earthy, and deep as the soil. 'Now you are rooted in me.'
    house_recruit_again: She emerges from the grove, staff in hand. 'The forest gave me leave. I will walk with you again.'

ghost_maid:
  name: Ghost Maid
  race: Shadow
  level: 10
  base_hp: 55
  mods:
    Dexterity: 3
    Charisma: 3
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} flickers like a candle, her voice an echo. 'I have served masters before... and they all left. Why should you be different?'
    recruit_accepted: The {name} solidifies, curtsying with spectral grace. 'My spirit finds... warmth in your presence. Allow me to serve once more — happily.'
    capture: The {name} flickers, her form solidifying as she curtsies. 'A new master... I shall not fade this time.'
    house_talk_low: She hovers, translucent and distant. 'You are a mortal... why do you linger with the dead?'
    house_talk_mid: She becomes more solid, offering a ghostly tea cup. 'Would you... care for some spectral tea? It's not quite real, but the thought is there.'
    house_talk_high: She drifts beside you, a faint warmth in her chill. 'You are the first to see me as more than a servant. I... appreciate that.'
    house_talk_max: She takes your hand, her touch almost solid. 'My heart, long cold, now beats for you. I will never leave.'
    house_gift_love: She gasps, a flicker of light in her eyes. 'A gift... for me? I have not received one in centuries. Thank you.'
    house_gift_hate: She stares blankly. 'This... does not cross the veil. It is of no use to me.'
    house_buff: She whispers an ancient blessing, a chill that strengthens your resolve. 'May the shadows conceal you and the spirits guide you.'
    house_bond_kiss: She leans in, her lips cold but full of feeling. 'A kiss from beyond – now you are bound to me.'
    house_recruit_again: She curtsies, a soft smile on her translucent face. 'I am ready to serve again, my master.'

centaur_scout:
  name: Centaur Scout
  race: Beast
  level: 11
  base_hp: 64
  mods:
    Strength: 2
    Dexterity: 2
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} stamps her hoof, crossing her arms. 'I charge with no herd I do not trust. Earn your place among us, two-legs.'
    recruit_accepted: The {name} extends a calloused hand. 'You have the heart of a stallion. Ride with me — we shall thunder across every battlefield!'
    capture: The {name} rears, then bows her head. 'You caught me fair, {player}. My hooves are yours... for now.'
    house_talk_low: She keeps her distance, ears flat. 'You smell like a city. I need open skies to talk.'
    house_talk_mid: She trots a circle around you. 'You're not as slow as I thought. Come, walk with me – I'll tell you of the plains.'
    house_talk_high: She nickers warmly, nudging you with her shoulder. 'You are a good companion. Let's run together sometime!'
    house_talk_max: She rests her head against yours, breathing deep. 'My herd is you. I would gallop to the ends of the earth for you.'
    house_gift_love: She paws the ground, delighted. 'A fine gift! It reminds me of the open meadows – thank you!'
    house_gift_hate: She snorts. 'This? It's useless. I can't wear it or eat it.'
    house_buff: She stamps a hoof, and a surge of speed fills your limbs. 'Now you run like the wind!'
    house_bond_kiss: She bends down, brushing her lips against your forehead. 'A kiss from a centaur – you are part of the herd now.'
    house_recruit_again: She tosses her mane, ready to charge. 'The plains call! Let us ride together again!'

moth_girl_flutterer:
  name: Moth Girl Flutterer
  race: Fey
  level: 12
  base_hp: 65
  mods:
    Dexterity: 4
    Charisma: 2
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} flutters her wings, keeping her distance. 'You are not... bright enough for me yet. I need to know you are the light I seek.'
    recruit_accepted: The {name} drifts closer, wing-dust shimmering like starlight. 'Your warmth calls to me. I will follow your flame anywhere, even into darkness.'
    capture: The {name} circles you, wing-dust sparkling. 'Your light... it is warmer than the moon, {player}.'
    house_talk_low: She flutters near, then retreats. 'You flicker like a candle in the wind. Steady yourself.'
    house_talk_mid: She lands on your shoulder, wings softly brushing your neck. 'You are a pleasant glow. Tell me about your day?'
    house_talk_high: She dances around you, leaving a trail of glowing dust. 'You are the brightest star in my sky! I want to hear everything about you!'
    house_talk_max: She settles in your lap, her wings folding. 'Your light is my home. I never want to fly elsewhere.'
    house_gift_love: She shimmers with joy. 'Oh, it's beautiful! It shines like the moon – I will keep it near my heart!'
    house_gift_hate: She dims, disappointed. 'It's... not glowing. I need things that shine.'
    house_buff: She sprinkles silver dust over you. 'May your path always be lit, even in the darkest night.'
    house_bond_kiss: She flutters up and presses her lips to yours – gentle as a moth's wing. 'Now you are my eternal flame.'
    house_recruit_again: She buzzes with excitement. 'I've been waiting for your light! Take me with you!'

slime_girl:
  name: Slime Girl
  race: Elemental
  level: 12
  base_hp: 88
  mods:
    Constitution: 4
    Dexterity: 2
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} bounces uncertainly, shape shifting. 'Bloop... You're not squishy-familiar yet. More play first? Bloop-bloop?'
    recruit_accepted: The {name} surges forward, wrapping around your arm in a cool, gelatinous hug. 'Bloop! You feel like home! Let's go together, go together!'
    capture: The {name} surges into your arms, jiggling happily. 'Bloop! You caught the best prize! Squish!'
    house_talk_low: She wobbles in place, a bit shy. 'Bloop... you're stiff. Relax?'
    house_talk_mid: She bounces closer, jiggling. 'Bloop-bloop! You're fun! Squish-squish?'
    house_talk_high: She wraps around your hand, warm and happy. 'Bloop! Your presence makes me giggle inside!'
    house_talk_max: She envelops you in a cool, loving embrace. 'Bloop... you are my home. I never want to let go.'
    house_gift_love: She absorbs the gift with a happy gurgle. 'Bloop! It's squishy and tasty! Perfect!'
    house_gift_hate: She spits it out, confused. 'Bloop... yucky. Not squishy at all.'
    house_buff: She squishes against you, leaving a glossy coat. 'Bloop! You're slippery now – hard to catch!'
    house_bond_kiss: She forms a gel-like mouth and gives you a gooey kiss. 'Bloop~ Now you're part of me!'
    house_recruit_again: She bounces eagerly. 'Bloop! Let's squish together again!'

lamia_constrictor:
  name: Lamia Constrictor
  race: Lizardfolk
  level: 13
  base_hp: 76
  mods:
    Strength: 2
    Dexterity: 3
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} coils her tail, tilting her head with a sly smile. 'Mmm, you are interesting... but I prefer to coil around someone I truly know, darling.'
    recruit_accepted: The {name} slithers close, wrapping her tail around your waist — warm, secure, almost possessive. 'You are mine now. And I am yours. Don't forget it.'
    capture: The {name} wraps her tail around you — gentle, not trapping. 'You caught me, darling. Now... what will you do with me?'
    house_talk_low: She circles you, watching. 'You're tense. I could help with that... if you trust me.'
    house_talk_mid: She rests her head on your shoulder, tail loose. 'You're not bad company. Tell me a secret?'
    house_talk_high: She coils around you in a gentle hug. 'You make me feel safe, little one. Stay with me.'
    house_talk_max: She wraps you fully, whispering in your ear. 'You are my prey and my partner. I will never let go.'
    house_gift_love: She hisses with pleasure, clutching the gift. 'Ooh, you know me so well. I'll treasure this.'
    house_gift_hate: She pushes it away with her tail. 'This... does not suit me. Try again.'
    house_buff: She breathes warm air over you, a soothing heat. 'My warmth will protect you from cold and fear.'
    house_bond_kiss: She cups your face and kisses you deeply. 'Now you are truly caught in my coils.'
    house_recruit_again: She slithers forward, a hungry glint in her eye. 'Ready for round two, darling? Let's hunt.'

lizard_queen:
  name: Lizard Queen
  race: Lizardfolk
  level: 14
  base_hp: 130
  mods:
    Charisma: 3
    Constitution: 3
  boss: true
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} reclines on her tail, unimpressed. 'A queen does not serve a commoner. Show me you are a ruler worth kneeling beside.'
    recruit_accepted: The {name} rises with regal poise, offering a clawed hand. 'You have proven yourself a worthy sovereign. I shall lend you my scales and my crown.'
    capture: The {name} hisses, then lowers her crown. 'You have defeated a queen. Treat her well, {player}, or face her wrath.'
    house_talk_low: She looks down her snout. 'You are beneath me. Speak only when spoken to.'
    house_talk_mid: She acknowledges you with a nod. 'You have earned a fraction of my attention. Use it wisely.'
    house_talk_high: She invites you to sit beside her. 'You show promise. Tell me of your conquests.'
    house_talk_max: She lays her head in your lap, regal yet vulnerable. 'You are the only one I would kneel for.'
    house_gift_love: She accepts with a dignified nod. 'A worthy offering. You are learning your place.'
    house_gift_hate: She scoffs. 'This is trash. Do not waste my time.'
    house_buff: She raises her claws and intones a royal blessing. 'May your victories be many.'
    house_bond_kiss: She presses her lips to yours – a queen's seal of devotion. 'Now you are mine, and I am yours.'
    house_recruit_again: She rises, scales gleaming. 'You have summoned your queen. Let us reclaim glory.'

mimic_girl:
  name: Mimic Girl
  race: Abomination
  level: 14
  base_hp: 95
  mods:
    Strength: 3
    Dexterity: 4
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} grins, revealing rows of sharp teeth. 'Hehe~ You're not interesting enough to open my lid for. Try again later, maybe~'
    recruit_accepted: The {name}'s tongue lolls out as she pounces into your arms. 'Jackpot! You're the best treasure I've ever found. Don't go hiding from me~'
    capture: The {name} snaps her lid shut, then opens it with a giggle. 'Hehe~ You actually caught me! Treasure secured~'
    house_talk_low: She snaps her jaws playfully. 'You look tasty... but I'm bored. Entertain me!'
    house_talk_mid: She hops closer, tongue out. 'Hehe~ You're fun! Tell me a joke!'
    house_talk_high: She nuzzles you, licking your cheek. 'Mmm~ You're my favourite treasure! Stay with me!'
    house_talk_max: She curls around you, purring. 'I've found the best treasure of all – you. I'll protect you forever~'
    house_gift_love: She devours it with glee. 'YUM! You know what I like! More, more!'
    house_gift_hate: She spits it out, disgusted. 'Blech! That's not treasure!'
    house_buff: She gives you a slobbery lick. 'There! Now you're lucky! Don't ask how it works~'
    house_bond_kiss: She turns into a small chest, pops open, and gives you a kiss from inside. 'Hehe~ Surprise! Now you're mine!'
    house_recruit_again: She transforms into a chest and leaps at you. 'Surprise! I'm ready to go again!'

umbral_weaver:
  name: Umbral Weaver
  race: Shadow
  level: 14
  base_hp: 85
  mods:
    Dexterity: 3
    Wisdom: 2
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} melts into the shadows, her voice drifting from the darkness. 'You are not yet woven into my web. Come closer... if you dare.'
    recruit_accepted: The {name} steps from the gloom, shadow-threads binding your hands together. 'You have become the thread I cannot cut. We are bound, little moth.'
    capture: The {name} steps from the shadows, threads trailing behind her. 'You snared the snarer. Impressive... little moth.'
    house_talk_low: She whispers from the corner. 'You are loud. Learn to be quiet, and I might speak.'
    house_talk_mid: She appears beside you, a faint smile. 'You are learning. Would you like to see the patterns I weave?'
    house_talk_high: She wraps a shadow-thread around your finger. 'You are part of my tapestry now. I will tell you secrets.'
    house_talk_max: She holds you in the darkness, warm and safe. 'You are my light in the void. I will never let you fade.'
    house_gift_love: She accepts it with a shadowy hand, and it melts into her form. 'A gift for the weaver? You are kind.'
    house_gift_hate: She lets it drop, untouched. 'It is too bright. It hurts.'
    house_buff: She spins a cloak of shadows around you. 'Now the darkness will hide and shield you.'
    house_bond_kiss: She steps from the dark and presses her lips to yours – cool as night. 'Now you are bound to the shadow.'
    house_recruit_again: She weaves a portal of darkness. 'Step through – I will guide you again.'

winter_fairy:
  name: Winter Fairy
  race: Fey
  level: 14
  base_hp: 70
  mods:
    Dexterity: 3
    Charisma: 2
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} flits away, leaving a trail of frost. 'Too warm, too fast. I need time to thaw... or you'll just melt my heart too quickly.'
    recruit_accepted: The {name} lands on your shoulder, her breath frosting your cheek. 'You melt the ice without breaking it. That is rare. I will stay... for now.'
    capture: The {name} alights on your finger, frost blooming where she touches. 'You are warm, {player}... but not burning. I will stay.'
    house_talk_low: She hovers just out of reach, frost in the air. 'You are too warm. I need distance.'
    house_talk_mid: She lands on your palm, ice melting slightly. 'You are not so bad. Tell me of summer?'
    house_talk_high: She curls up in your hood, her chill a comfort. 'You are my winter sun. Stay with me?'
    house_talk_max: She presses her cold cheek to yours. 'You are the warmth I never knew I needed. I love you.'
    house_gift_love: She hugs it, leaving a frost pattern. 'It's perfect! It reminds me of icicles!'
    house_gift_hate: She drops it, shivering. 'This is too hot. Take it away.'
    house_buff: She breathes a frosty mist over you. 'May your steps be silent and your heart cold as ice.'
    house_bond_kiss: She flutters up and kisses you – cold and sweet as fresh snow. 'Now you are winter's chosen.'
    house_recruit_again: She flits around you, leaving frost trails. 'I've been waiting for the cold to return. Let's go!'

holstaur_brawler:
  name: Holstaur Brawler
  race: Beast
  level: 15
  base_hp: 115
  mods:
    Strength: 4
    Constitution: 5
    Charisma: 1
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} flexes her muscles, snorting. 'You look scrawny. I don't throw hooves for someone I could bench-press. Show me some grit!'
    recruit_accepted: The {name} slaps your back with enough force to stagger you, laughing heartily. 'Haha! You got spirit! Let's crack some skulls together, partner!'
    capture: The {name} snorts, then grins and pounds her chest. 'Hah! You got me, {player}! Best catch of the day!'
    house_talk_low: She cracks her knuckles. 'Talk? I'd rather wrestle. But fine, make it quick.'
    house_talk_mid: She grins, slapping your shoulder. 'You're tougher than you look! Let's arm-wrestle!'
    house_talk_high: She throws an arm around you. 'You're my favourite sparring buddy! Let's grab a drink!'
    house_talk_max: She hugs you, nearly crushing you. 'I'd take a thousand hits for you. You're my herd.'
    house_gift_love: She bellows with joy, tossing it in the air. 'I LOVE IT! Let's celebrate!'
    house_gift_hate: She snorts, unimpressed. 'This is useless. Can I eat it?'
    house_buff: She flexes and gives you a hearty pat. 'There! Now you've got the strength of a bull!'
    house_bond_kiss: She plants a kiss on your forehead, a bit too hard. 'Mwah! Now you're mine, partner!'
    house_recruit_again: She stamps her hoof, ready for action. 'Time to brawl again! Let's go!'

gargoyle_watcher:
  name: Gargoyle Watcher
  race: Construct
  level: 16
  base_hp: 120
  mods:
    Constitution: 5
    Strength: 3
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} folds her stone wings, immovable. 'I have watched a thousand seasons. You are but a flicker. Why should I leave my perch?'
    recruit_accepted: The {name} cracks her stone knuckles, eyes gleaming with ancient life. 'You have earned the gaze of the eternal. I shall guard you as I guard the spires.'
    capture: The {name} cracks her stone wings, then nods. 'A thousand years I watched. Finally... someone worth watching with.'
    house_talk_low: She stands motionless, eyes following you. 'You move too fast. I watch.'
    house_talk_mid: She shifts slightly, a grinding sound. 'You are... interesting. Tell me of the world beyond my perch.'
    house_talk_high: She sits beside you, stone warm from the sun. 'You have become my favourite sight. Stay a while.'
    house_talk_max: She takes your hand, her grip solid but gentle. 'You are the only thing I will leave my perch for.'
    house_gift_love: She examines it, then nods once. 'A worthy tribute. I shall keep it always.'
