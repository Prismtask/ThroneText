    house_talk_max: She takes your hand, her phylactery warm. 'You are the equation
      I never solved. I love you.'
    house_talk_engaged_1: The {name} records data in her tome, but pauses to smile
      at you. 'My anomalous variable, you've defied all calculations. Our equation
      now trends toward infinite love.'
    house_talk_engaged_2: The {name} shows you a glowing phylactery with both your
