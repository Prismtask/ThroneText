    house_gift_love: She bellows, clutching it to her chest. 'IT'S PERFECT! I'm keeping
      it forever!'
    house_gift_hate: She crushes it, unimpressed. 'Useless. Give me something to smash.'
    house_buff: She roars, and you feel a surge of power. 'Now you have the strength
