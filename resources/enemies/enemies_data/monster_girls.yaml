  monster_girl: true
  dialogue:
    recruit_denied: The {name} exhales a breath of starfire, indifferent. 'I am the
      breath of creation. You are a spark in the void. Do not waste my time with mortal
      whims.'
    recruit_accepted: The {name} lowers her massive head, starlight pooling in her
      eyes. 'You are the ember that refuses to die. I will burn the world for you
      — and build it anew from the ashes.'
    capture: The {name} lowers her massive head, starlight pooling. 'You caught a
      star, {player}. Do not drop it, little spark.'
    house_talk_low: She coils, immense and unapproachable. 'You are nothing. Do not
      presume.'
    house_talk_mid: She regards you with a glimmer of interest. 'You have a spark.
      Let us see if it kindles.'
    house_talk_high: She lowers her head to your level. 'You are worthy of my breath.
      Speak.'
    house_talk_max: She wraps you in her wing, gentle as a star. 'You are my constellation.
      I love you.'
    house_talk_engaged_1: The {name} shrinks to a more human scale, wrapping a wing
      around you. 'Tiny spark, you've made a goddess know devotion. I'll cradle you
      in starlight.'
    house_talk_engaged_2: The {name} breathes out a miniature galaxy that orbits your
      joined hands. 'I've woven a constellation of our love into the cosmos. Look
      up anytime and see us.'
    house_gift_love: She accepts it, and it glows with cosmic light. 'A gift for a
      goddess? You are bold. I like it.'
    house_gift_hate: She incinerates it. 'It is dust. Do not offer me dust.'
    house_buff: She breathes starlight over you. 'May you shine as bright as the cosmos.'
    house_bond_kiss: She kisses you, and you taste galaxies. 'Now you are my eternal
      flame.'
    house_recruit_again: She rises, wings spanning the sky. 'The stars are aligned.
      Let us reshape the world.'
    engaged: Tiny spark... you would bind yourself to a goddess? Then I shall shelter
      you in my wings for all eternity.
    special_gift: A mortal offering for a star? It is... precious, because it is from
      you. I'll weave it into my constellation.
    ascension_pre_ceremony: The {name} lowers her colossal head, starfire dimming.
      'Even a goddess can be constrained by mortal vessels. Use the stone, and I shall
      reveal a glimpse of my true form.'
    ascension_post_ceremony: The {stone} erupts into a miniature supernova that flows
      into {name}. Her scales shimmer with nebulae. 'Creation bows. Level {old_cap}
      was a fleeting thought.'
    is_defeated: She shrinks to a faint ember, her starfire nearly gone. 'This form...
      is so frail...'
    is_recovered: She expands back into blazing glory. 'A goddess cannot be dimmed
      for long. The stars burn again!'

arachne_brood_queen:
  name: Arachne Brood Queen
  race: Beast
  level: 38
  base_hp: 310
  mods:
    Strength: 11
    Constitution: 11
    Dexterity: 13
    Wisdom: 4
    Learning: 3
    Charisma: 4
  boss: true
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} tends to a cocoon of writhing silk, not sparing you
      a glance. 'My brood is countless. My patience is not. You are not yet worthy
      to walk my web.'
    recruit_accepted: The {name} cradles your face in her many hands, silk soft as
      a mother's touch. 'You are the egg I never laid, the thread I never cut. I will
      weave victory around you.'
    capture: The {name} cradles you in her many arms, silk soft as a lullaby. 'You
      are the thread I never knew I needed, {player}.'
    house_talk_low: She works her web, ignoring you. 'You are a fly. Stay out of my
      web.'
    house_talk_mid: She pauses, giving you a glance. 'You are not a pest. Speak, but
      do not tangle.'
    house_talk_high: She sits with you, her many hands gentle. 'You are a fine thread.
      I would weave you into my family.'
    house_talk_max: She envelops you in silk and love. 'You are my brood-mate. I love
      you.'
    house_talk_engaged_1: The {name} cradles you in her many arms, her brood humming
      a soft lullaby. 'My heart-mate, my new egg — our family will spin webs across
      the world.'
    house_talk_engaged_2: The {name} gifts you a silken cloak threaded with her love.
      'Wear this and feel my embrace, even when battles separate us.'
    house_gift_love: She takes it, weaving it into her web. 'A gift for the queen?
      You are wise.'
    house_gift_hate: She cuts it away. 'It is coarse. It does not belong.'
    house_buff: She wraps a silk blessing around you. 'May you never be trapped, and
      always ensnare your foes.'
    house_bond_kiss: She kisses you, silk soft. 'Now you are part of my brood.'
    house_recruit_again: She rises, her brood stirring. 'My web is ready. Let us hunt
      together.'
    engaged: You would join my brood as my heart-mate? Then I shall weave a cocoon
      of love around you, forever.
    special_gift: A trinket for my web... I'll dangle it where the light catches it,
      a jewel for all to see.
    ascension_pre_ceremony: The {name} weaves a cocoon of silk, her many eyes soft.
      'My brood stretches far, but I wish to birth new possibilities. Use the stone,
      and I will weave a future for us.'
    ascension_post_ceremony: The {stone} bursts into a thousand tiny silk threads
      that knit a majestic pattern on {name}. Her brood chitters joyfully. 'The web
      of eternity is spun. Level {old_cap} is an empty egg.'
    is_defeated: She curls around her brood, silk torn. 'My children... protect them...'
    is_recovered: She rises, spinning fresh silk. 'The brood is safe and so am I.
      The queen will weave again.'

cosmic_slime_empress:
  name: Cosmic Slime Empress
  race: Elemental
  level: 40
  base_hp: 480
  mods:
    Strength: 6
    Constitution: 13
    Dexterity: 6
    Wisdom: 5
    Learning: 10
    Charisma: 8
  boss: true
  monster_girl: true
  super_boss: false
  dialogue:
    recruit_denied: The {name} ripples with the colors of distant galaxies, indifferent.
      'I am the space between stars. You are a grain on a speck. Return when you are
      a constellation.'
    recruit_accepted: The {name} envelops you in a cosmic embrace — cool, infinite,
      and warm all at once. 'You are the gravity I did not expect. I will orbit you
      until the universe ends... and after.'
    capture: The {name} envelops you in galaxies, cool and infinite. 'You are the
      gravity I have been drifting toward, {player}. Welcome home.'
    house_talk_low: She drifts, formless. 'You are too small. I cannot perceive you.'
    house_talk_mid: She coalesces into a humanoid shape, curious. 'You are a tiny
      miracle. Tell me of your world.'
    house_talk_high: She wraps a tendril around you, stars within. 'You have become
      a galaxy to me. Stay.'
    house_talk_max: She holds you in her cosmic form, infinite love. 'You are the
      center of my universe. I love you.'
    house_talk_engaged_1: The {name} ripples with the colors of a nebula, a tiny planetoid
      ring around her core. 'Bloop~ You are the gravity that holds my universe together.
      I'm your cosmic lover.'
    house_talk_engaged_2: The {name} extends a pseudopod holding a starseed. 'I've
      compressed a little love-star for you. Plant it in your heart, and it will grow
      into a galaxy of our feelings.'
    house_gift_love: She absorbs it, and it glows with new colors. 'A gift from a
      mortal? It is precious.'
    house_gift_hate: She lets it drift away. 'It is not of the cosmos. I cannot accept.'
    house_buff: She imbues you with stardust. 'May you traverse the void and never
      lose your way.'
    house_bond_kiss: She kisses you, and you feel the birth of stars. 'Now you are
      eternal.'
    house_recruit_again: She ripples, galaxies swirling. 'The universe calls. Let
      us journey together.'
    engaged: You wish to be the center of my universe forever? Then you are the gravity
      I will never escape. Bloop~ in the cosmos.
    special_gift: A speck from your world... I'll keep it in my core, where galaxies
      are born.
    ascension_pre_ceremony: The {name} ripples, galaxies swirling. 'I am the void,
      yet even the void has edges. Use the stone, and I will become the universe's
      gentle hug.'
    ascension_post_ceremony: The {stone} dissolves into cosmic jelly that expands
      and contracts, then merges with {name}. She glows with all the colors of spacetime.
      'I am boundless! Level {old_cap} was a tiny speck.'
    is_defeated: She disperses into a dim cloud, barely holding together. 'So...
      cold... the void... pulling me apart...'
    is_recovered: She coalesces back into a brilliant nebula. 'The cosmos reforms.
      I am infinite once more!'
