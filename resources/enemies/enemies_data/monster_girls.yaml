gorgon_petrifier:
  name: Gorgon Petrifier
  race: Lizardfolk
  level: 28
  base_hp: 175
  mods:
    Strength: 6
    Constitution: 6
    Dexterity: 7
    Wisdom: 7
    Learning: 3
    Charisma: 7
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} adjusts her veil, snakes hissing a warning. 'One look
      and you are stone. One word and you are dust. Why would I trade solitude for
      a fragile mortal?'
    recruit_accepted: The {name} lifts her veil, and for the first time her eyes hold
      no threat — only wonder. 'You did not turn to stone. You are my first... my
      only... safe place.'
    capture: The {name} lifts her veil slowly, snakes hissing softly. 'You did not
      turn away. You did not turn to stone. You are... my first, {player}.'
    house_talk_low: She keeps her veil down, snakes hissing. 'You are too bold. Look
      away.'
    house_talk_mid: She lifts the veil a fraction. 'You are not afraid? ...Interesting.'
    house_talk_high: She lets you touch her face, snakes still. 'You see me for who
      I am. I... like that.'
    house_talk_max: She holds you, veil discarded, snakes nuzzling you. 'You are my
      only safe harbor. I love you.'
    house_talk_engaged_1: The {name} lifts her veil partway, snakes nuzzling your
      cheeks. 'I never thought I'd find someone who could look into my eyes and see
      me, not stone. You are my safe harbor.'
    house_talk_engaged_2: The {name} holds a mirror that reflects your face, not hers.
      'With you, I can finally see beauty without fear. I'll cherish our reflection.'
    house_gift_love: She accepts it, and her snakes calm. 'A gift... I have never
      received one. Thank you.'
    house_gift_hate: She recoils, snakes hissing. 'It is a trap. Take it away.'
    house_buff: She whispers a petrification charm that hardens your resolve. 'May
      you be as unyielding as stone.'
    house_bond_kiss: She kisses you, and you feel no fear. 'Now you are safe from
      my gaze.'
    house_recruit_again: She lifts her veil, a smile on her face. 'I will walk with
      you again.'
    engaged: You... you would spend your life with one who could turn you to stone?
      Then I will look only at your heart. Yes.
    special_gift: A gift I can look at without fear. I'll keep it where my gaze can't
      harm it.
    ascension_pre_ceremony: The {name} lifts her veil just enough to show her eyes,
      soft. 'My gaze petrifies even myself if I look inward. With the stone, turn
      my curse into a blessing — for you.'
    ascension_post_ceremony: The {stone} transforms into a mirror that reflects her
      eyes, then shatters into sparkling scales. {name}'s snakes calm, her face serene.
      'I see clearly now. Level {old_cap} is a statue of the past.'
    is_defeated: Her veil slips, and she frantically covers her eyes. 'Don't look...
      I can't control it... run...'
    is_recovered: She carefully adjusts her veil and takes a calming breath. 'The
      gaze is tamed again. I am safe for you now.'

ninetales_fox:
