    house_talk_mid: She offers you a riddle. 'Solve this, and I will talk.'
    house_talk_high: She purrs, pleased. 'You have solved many. You are worthy of
      my company.'
    house_talk_max: She curls against you, her voice a purr. 'You are the answer to
      my oldest riddle. I love you.'
    house_talk_engaged_1: 'The {name} ponders, tail flicking, then grins. ''I''ve
      devised a new riddle: ''What binds two souls without rope and lasts without
      time?'' The answer is us, my clever one.'''
    house_talk_engaged_2: The {name} offers you a scroll sealed with a wax pawprint.
      'Inside is a riddle only we can solve. Let's embark on this puzzle together.'
    house_gift_love: She takes it, a smile on her face. 'A gift wrapped in a puzzle?
      You know me well.'
    house_gift_hate: She sets it aside, unimpressed. 'It is too obvious. I need mystery.'
    house_buff: She whispers a riddle that unlocks your mind. 'May your thoughts be
      sharp and your words true.'
    house_bond_kiss: She kisses you, and you feel the answer to all questions. 'Now
      you know my heart.'
    house_recruit_again: She stretches, a new riddle on her lips. 'I missed you. Let
      us solve the world together.'
    engaged: The answer to the riddle of my heart is you. Will you be my eternal question?
      Yes, my clever one.
    special_gift: A puzzle-box? Or just a gift? Either way, it intrigues me. I'll
      study it for years.
    ascension_pre_ceremony: 'The {name} taps her chin, tail curling. ''The ultimate
      riddle: how to surpass one''s own design. I ask you, my answerer, to provide
      the stone and solve it.'''
    ascension_post_ceremony: The {stone} cracks open like an ancient scroll, releasing
      hieroglyphs of light that sink into {name}. She smirks. 'Riddle solved. Level
      {old_cap} was the question.'
    is_defeated: She lies down, tail limp, and sighs. 'A riddle I could not solve...
      myself...'
    is_recovered: She springs up with a purr. 'The answer was to keep trying. Now
      I have a new riddle for you.'

lich_queen_avatar:
