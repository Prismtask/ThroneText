goblin_girl:
  name: Goblin Girl
  race: Goblin
  level: 2
  base_hp: 14
  mods:
    Strength: 1
    Constitution: 1
    Dexterity: 3
    Wisdom: 1
    Learning: 1
    Charisma: 3
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} shuffles back nervously, clutching her hands. 'U-um...
      I don't really know you that well yet... Can we talk more first?'
    recruit_accepted: The {name}'s eyes light up as she grabs your sleeve. 'Really?
      You'll take me with you? I'll try my best, I promise!'
    capture: The {name} blushes deeply and shyly steps into your arms...
    house_talk_low: The {name} fidgets with her fingers. 'S-so... what do you want?
      I'm not very good at talking...'
    house_talk_mid: The {name} smiles nervously. 'Oh! You're back! I was just polishing
      my lucky coin. Wanna see?'
    house_talk_high: The {name} giggles and grabs your hand. 'Hehe, you always know
      how to make me smile. Tell me a story?'
    house_talk_max: The {name} curls up beside you, resting her head on your shoulder.
      'I feel so safe when you're here... I wish I could stay like this forever.'
    house_talk_engaged_1: The {name} gazes at her lucky coin, now with a tiny carved
      heart. 'Ehehe, being yours forever makes me feel so lucky... What do you want
      to do today?'
    house_talk_engaged_2: The {name} clings to your arm, looking up at you with starry
      eyes. 'I-I still can't believe you chose me. Tell me I'm not dreaming!'
    house_gift_love: The {name} gasps, clutching the gift to her chest. 'For me?!
      Oh, I love it! Thank you, thank you!'
    house_gift_hate: The {name} forces a weak smile. 'Oh... uh... thanks, I guess?
      Maybe I can trade it for something else...'
    house_buff: The {name} closes her eyes and whispers a small incantation. 'There!
      A little luck from me to you – don't waste it!'
    house_bond_kiss: The {name} stands on tiptoe and pecks your cheek, then hides
      her face. 'Ehehe... I've wanted to do that for so long.'
    house_recruit_again: The {name} jumps up, grabbing your arm. 'You're back for
      me! I knew you'd come! Let's go!'
    engaged: You... you really want me to be yours forever? B-but I'm just a goblin...
      Oh, I'm so happy!
    special_gift: This... this is so precious! I-I'll keep it safe forever, right
      next to my heart!
    ascension_pre_ceremony: The {name} fidgets with her lucky coin, eyes wide. 'I-I
      think I'm ready... Please, break my limits so I can be braver for you!'
    ascension_post_ceremony: The {stone} bursts into a shower of golden sparks! {name}
      gasps as light swirls around her. 'I feel... stronger! No more Level {old_cap}!
      Thank you!'
    is_defeated: The {name} stumbles back, tears welling up. 'O-ow... I can't... please
      don't be mad at me...'
    is_recovered: The {name} sniffles, then clutches her lucky coin tightly. 'Okay...
      I'm better now! I won't let you down again!'

harpy_scout:
  name: Harpy Scout
  race: Beast
  level: 5
  base_hp: 27
  mods:
    Strength: 2
    Constitution: 2
    Dexterity: 5
    Wisdom: 1
    Learning: 1
    Charisma: 2
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} ruffles her feathers and turns her head away. 'Hmph.
      A sky-rider like me doesn't follow just anyone. Prove yourself first.'
    recruit_accepted: The {name} spreads her wings with a sharp cry. 'A worthy wind-mate!
      I'll scout the skies for you — none shall sneak past!'
    capture: The {name} squawks in surprise, then softens as she lands beside you.
      'Fine... but only because you're quick, {player}.'
    house_talk_low: The {name} preens her wing, not looking at you. 'Oh, it's you.
      What do you want, groundling?'
    house_talk_mid: She ruffles her feathers, a hint of a smile. 'You're not as clumsy
      as you look. Want to hear about the clouds I saw today?'
    house_talk_high: She chirps happily, hopping closer. 'The wind told me you were
      coming! Let's fly together – I'll show you the world from above!'
    house_talk_max: She nuzzles your neck, wings half‑spread. 'You are my sky. I never
      want to land again.'
    house_talk_engaged_1: The {name} preens her feathers, a woven band around one
      wing. 'Every cloud I scout, I scan for your shadow. Being sky-bonded has made
      my heart lighter than the wind.'
    house_talk_engaged_2: The {name} circles above your head, then lands softly on
      your shoulder. 'Our nest is the sky, and I'm never landing without you, wind-mate.'
    house_gift_love: She squawks with delight, snatching the gift. 'For me?! Oh, it's
      perfect! I'll wear it on my wing!'
    house_gift_hate: She tilts her head, confused. 'Uh... what is this? I can't eat
      it or fly with it...'
    house_buff: She breathes a warm gust of wind over you. 'There – a tailwind for
      your journey. Use it well!'
    house_bond_kiss: She leans in, brushing her beak against your cheek. 'A kiss from
      the skies – now you're marked as mine.'
    house_recruit_again: She spreads her wings, eyes gleaming. 'Ready for another
      adventure? I've been itching to fly!'
    engaged: A life-mate? You wish to soar the endless skies with me, bound as one?
      ... Yes, yes, a thousand times yes!
    special_gift: This gift... it shines like the sun on my wings. I'll treasure it
      above all nests.
    ascension_pre_ceremony: The {name} folds her wings and bows low. 'Wind-mate...
      the sky calls me higher. Will you lift my chains so I may soar beyond?'
    ascension_post_ceremony: The {stone} shatters, releasing a tempest of feathers!
      {name} shrieks joyfully as ancient currents surge through her. 'The sky just
      got bigger! Level {old_cap}... gone!'
    is_defeated: The {name} crashes to the ground, wings askew. 'Nngh... my wings...
      I can't fly like this...'
    is_recovered: She shakes out her feathers and tests a wing, then chirps. 'The
      wind feels right again! Up we go, wind-mate!'

alraune_fledger:
  name: Alraune Fledger
  race: Fey
  level: 7
  base_hp: 40
  mods:
    Strength: 1
    Constitution: 1
    Dexterity: 3
    Wisdom: 2
    Learning: 3
    Charisma: 5
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} tilts her flower-crown curiously, petals closing slightly.
      'The soil between us is still thin... Water it more, traveller.'
    recruit_accepted: The {name} blooms radiantly, sweet pollen drifting around you.
      'Our roots have intertwined. I shall bloom beside you, always.'
    capture: The {name} releases a sweet fragrance, petals folding around your hand
      gently. 'You... may tend to me, {player}.'
    house_talk_low: The {name} rustles her leaves, eyes half‑closed. 'You are a stranger
      in my garden. Speak softly.'
    house_talk_mid: She offers you a small blossom. 'I grew this for you. It smells
      like friendship – do you like it?'
    house_talk_high: She wraps a vine around your wrist, pulling you close. 'My petals
      open only for you now. Stay a while?'
    house_talk_max: She rests her head on your chest, fragrant and warm. 'I have woven
      my roots into your heart. Never leave me.'
    house_talk_engaged_1: The {name}'s petals shimmer as she entwines her fingers
      with yours. 'Our roots are forever intertwined now. I'll bloom new flowers just
      to celebrate each day with you.'
    house_talk_engaged_2: The {name} rests her head on your chest, a soft fragrance
      filling the room. 'My gardener, my sun... tell me what you desire and I'll grow
      it from my heart.'
    house_gift_love: She radiates warmth, petals unfurling. 'Such a beautiful offering!
      I will treasure it forever.'
    house_gift_hate: She shrinks back, leaves drooping. 'Oh... this doesn't suit me
      at all. Please take it back.'
    house_buff: She sprinkles golden pollen over you. 'May your steps be light and
      your harvest plentiful.'
    house_bond_kiss: She leans forward, pressing her lips to yours – soft as petals.
      'Now we are bound, root and stem.'
    house_recruit_again: She extends a leafy hand, smiling. 'The forest calls us.
      Let us walk together again.'
    engaged: You wish to intertwine our roots forever? Then I shall bloom only for
      you, my gardener, my sun.
    special_gift: Oh! This gift... it smells like forever. I'll weave it into my petals.
    ascension_pre_ceremony: The {name} kneels among blooming vines, petals trembling.
      'My roots feel bound... Water me with this stone, dear gardener, so I may bloom
      brighter.'
    ascension_post_ceremony: The {stone} crumbles into glowing pollen! New vines spiral
      up {name}'s form as a sweet fragrance fills the air. 'I have broken my shell!
      Level {old_cap} is no more.'
    is_defeated: The {name}'s petals droop and her leaves turn brown at the edges.
      'I'm... wilting... need water...'
    is_recovered: She drinks from a tiny dew-drop and her petals perk right up. 'Ahh,
      the sun feels good again. Let's grow!'

kobold_tinkerer:
  name: Kobold Tinkerer
  race: Dragonkin
  level: 8
  base_hp: 45
  mods:
    Strength: 3
    Constitution: 3
    Dexterity: 4
    Wisdom: 2
    Learning: 3
    Charisma: 1
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} hides a small gadget behind her back, tail flicking.
      'Wh-what? No. I barely know you. You might break my stuff!'
    recruit_accepted: The {name} pulls out a tiny device and presses it into your
      palm. 'Here! My best prototype. Now we can tinker together — partners!'
    capture: The {name} drops her gadgets, tail wagging despite herself. 'D-don't
      break anything, okay {player}?'
    house_talk_low: She fumbles with a gear, avoiding your eyes. 'Um... I'm busy.
      You can watch if you don't touch anything.'
    house_talk_mid: She shows you a new contraption, eyes bright. 'Look! I made it
      spin faster! Wanna see how it works?'
    house_talk_high: She bounces on her heels, talking a mile a minute. 'You're the
      best listener! I have so many ideas – let's build something together!'
    house_talk_max: She curls up against you, holding a tiny clockwork heart. 'I made
      this for you. It ticks in time with mine.'
    house_talk_engaged_1: The {name} fiddles with a tiny clockwork ring on her finger,
      tail wagging. 'It's calibrated to beat with my heart! Being your permanent lab
      partner is the greatest experiment!'
    house_talk_engaged_2: The {name} holds up a new invention that projects tiny floating
      hearts. 'I made this to show how much I love you! I'll build us a whole world
      of gadgets.'
    house_gift_love: She squeals, examining the gift from every angle. 'This is AMAZING!
      I can use it in my next invention!'
    house_gift_hate: She stares at it, puzzled. 'Uh... what does it do? It doesn't
      even have gears...'
    house_buff: She taps your forehead with a wrench. 'There! A boost of inspiration
      – your mind will work faster now.'
    house_bond_kiss: She hesitates, then plants a quick kiss on your nose. 'T-that
      was a spark! See? Sparks are good!'
    house_recruit_again: She straps on her toolbelt, grinning. 'Time to tinker and
      fight! I've got new gadgets to test!'
    engaged: Y-you want to be my permanent lab partner? Like... for life? This is
      the best experiment ever! Yes!
    special_gift: Is this... a rare component? I can't even identify it! I'll study
      it and think of you with every gear.
    ascension_pre_ceremony: The {name} holds a tiny device that sparks erratically.
      'I-I built a stabilizer for the ascension... if you'll trust me. Please, break
      my limits — I want to invent greater things!'
    ascension_post_ceremony: The {stone} detonates in a controlled explosion of gears
      and light! {name}'s tail frizzes as energy crackles over her. 'Haha! The calibrations
      worked! Farewell Level {old_cap}!'
    is_defeated: A spring flies out of her pocket as she collapses. 'M-my gadgets... they
      failed... I'm useless...'
    is_recovered: She frantically repairs the last gadget, then holds it up. 'Fixed
      it! And I added a new function! I'm back in action!'

dryad_protector:
  name: Dryad Protector
  race: Fey
  level: 9
  base_hp: 50
  mods:
    Strength: 1
    Constitution: 2
    Dexterity: 3
    Wisdom: 5
    Learning: 2
    Charisma: 4
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} steps behind a tree, leaves rustling. 'You are but
      a stranger passing through my grove. The forest does not trust lightly.'
    recruit_accepted: The {name} takes your hand, bark-soft skin warm against yours.
      'The ancient trees whisper your name with favor. I will guard you as I guard
      them.'
    capture: The {name} emerges from the bark, vines wrapping your wrist softly. 'The
      forest... allows you, {player}.'
    house_talk_low: She stays half‑hidden behind a trunk. 'You have not earned my
      leaves yet. Speak, but do not touch.'
    house_talk_mid: She steps closer, a twig snapping underfoot. 'You are not as loud
      as the others. I... can listen.'
    house_talk_high: She touches your cheek, bark‑rough but gentle. 'You are like
      sunlight through the canopy. Stay a while.'
    house_talk_max: She wraps her arms around you, leaves rustling with affection.
      'You are my tree, my roots, my home.'
    house_talk_engaged_1: The {name} traces a symbol in the earth that glows softly.
      'The forest has blessed our union. I feel the ancient trees rejoicing within
      me.'
    house_talk_engaged_2: The {name} steps out from behind a tree, holding a small
      sapling. 'I'm planting this for us — a new life to grow alongside our love.'
    house_gift_love: She accepts it with a reverent bow. 'The forest thanks you. I
      thank you. It will grow in my heart.'
    house_gift_hate: She pushes it back gently. 'This does not belong among the trees.
      Take it away.'
    house_buff: She traces a rune on your palm with a twig. 'May the earth shield
      you and the branches guide you.'
    house_bond_kiss: She presses her lips to yours – cool, earthy, and deep as the
      soil. 'Now you are rooted in me.'
    house_recruit_again: She emerges from the grove, staff in hand. 'The forest gave
      me leave. I will walk with you again.'
    engaged: The forest whispers that our souls have taken root together. I... I accept
      this eternal bond, my tree.
    special_gift: This offering... it is like a seed of joy. I will plant it in my
      heartwood.
    ascension_pre_ceremony: The {name} bows, bark creaking, leaves rustling. 'The
      ancient wood whispers that I may grow beyond my ringed years. Will you give
      me the strength to protect our grove?'
    ascension_post_ceremony: The {stone} splinters into shards of emerald light that
      rain down like leaves. {name}'s bark glistens, new branches sprouting. 'I feel
      the seasons turning... Level {old_cap} is just a memory.'
    is_defeated: The {name} slumps against a tree, bark cracking. 'The grove... it
      aches... I cannot stand...'
    is_recovered: New moss and leaves sprout over the cracks as she rises. 'The earth
      has healed me. I am ready to protect you again.'

ghost_maid:
  name: Ghost Maid
  race: Shadow
  level: 10
  base_hp: 55
  mods:
    Strength: 2
    Constitution: 2
    Dexterity: 6
    Wisdom: 2
    Learning: 2
    Charisma: 4
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} flickers like a candle, her voice an echo. 'I have
      served masters before... and they all left. Why should you be different?'
    recruit_accepted: The {name} solidifies, curtsying with spectral grace. 'My spirit
      finds... warmth in your presence. Allow me to serve once more — happily.'
    capture: The {name} flickers, her form solidifying as she curtsies. 'A new master...
      I shall not fade this time.'
    house_talk_low: She hovers, translucent and distant. 'You are a mortal... why
      do you linger with the dead?'
    house_talk_mid: She becomes more solid, offering a ghostly tea cup. 'Would you...
      care for some spectral tea? It's not quite real, but the thought is there.'
    house_talk_high: She drifts beside you, a faint warmth in her chill. 'You are
      the first to see me as more than a servant. I... appreciate that.'
    house_talk_max: She takes your hand, her touch almost solid. 'My heart, long cold,
      now beats for you. I will never leave.'
    house_talk_engaged_1: The {name} curtsies, her form almost solid, a tiny spectral
      ring on her finger. 'My master, my love... I shall serve you not out of duty,
      but out of endless affection.'
    house_talk_engaged_2: The {name} floats by your side, her chill now a comforting
      coolness. 'Death could not hold my heart, and you have given me a reason to
      exist. I'll haunt you with love.'
    house_gift_love: She gasps, a flicker of light in her eyes. 'A gift... for me?
      I have not received one in centuries. Thank you.'
    house_gift_hate: She stares blankly. 'This... does not cross the veil. It is of
      no use to me.'
    house_buff: She whispers an ancient blessing, a chill that strengthens your resolve.
      'May the shadows conceal you and the spirits guide you.'
    house_bond_kiss: She leans in, her lips cold but full of feeling. 'A kiss from
      beyond – now you are bound to me.'
    house_recruit_again: She curtsies, a soft smile on her translucent face. 'I am
      ready to serve again, my master.'
    engaged: You would bind your soul to a ghost? I... I have not felt such warmth
      since I lived. Yes, my master, my love.
    special_gift: A gift from the living... I can feel it. I shall place it on my
      ethereal altar, never to fade.
    ascension_pre_ceremony: The {name} flickers, almost solid, her voice echoing.
      'Master... I have been bound by death for so long. If you would, break these
      chains so I may truly serve you.'
    ascension_post_ceremony: The {stone} dissolves into ectoplasmic mist that floods
      into {name}. Her form crystallizes, brighter than ever. 'I feel... alive? Level
      {old_cap} has faded... Thank you, master.'
    is_defeated: The {name} fades almost to nothingness, a faint wisp. 'Master... I'm
      fading... please don't forget me...'
    is_recovered: She re-materialises with a soft glow, curtsying. 'I've returned,
      master. My spirit is as strong as my devotion.'

centaur_scout:
  name: Centaur Scout
  race: Beast
  level: 11
  base_hp: 64
  mods:
    Strength: 5
    Constitution: 3
    Dexterity: 5
    Wisdom: 2
    Learning: 2
    Charisma: 2
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} stamps her hoof, crossing her arms. 'I charge with
      no herd I do not trust. Earn your place among us, two-legs.'
    recruit_accepted: The {name} extends a calloused hand. 'You have the heart of
      a stallion. Ride with me — we shall thunder across every battlefield!'
    capture: The {name} rears, then bows her head. 'You caught me fair, {player}.
      My hooves are yours... for now.'
    house_talk_low: She keeps her distance, ears flat. 'You smell like a city. I need
      open skies to talk.'
    house_talk_mid: She trots a circle around you. 'You're not as slow as I thought.
      Come, walk with me – I'll tell you of the plains.'
    house_talk_high: She nickers warmly, nudging you with her shoulder. 'You are a
      good companion. Let's run together sometime!'
    house_talk_max: She rests her head against yours, breathing deep. 'My herd is
      you. I would gallop to the ends of the earth for you.'
    house_talk_engaged_1: The {name} trots in place, a leather band woven into her
      mane. 'Being your herd-mate fills my hooves with thunder! Where shall we gallop
      today, my stallion?'
    house_talk_engaged_2: The {name} nuzzles your hair, breathing deep. 'The open
      plains are vast, but my whole world is right here at your side.'
    house_gift_love: She paws the ground, delighted. 'A fine gift! It reminds me of
      the open meadows – thank you!'
    house_gift_hate: She snorts. 'This? It's useless. I can't wear it or eat it.'
    house_buff: She stamps a hoof, and a surge of speed fills your limbs. 'Now you
      run like the wind!'
    house_bond_kiss: She bends down, brushing her lips against your forehead. 'A kiss
      from a centaur – you are part of the herd now.'
    house_recruit_again: She tosses her mane, ready to charge. 'The plains call! Let
      us ride together again!'
    engaged: You wish to be my herd-mate for all seasons? Then let us gallop into
      eternity together, my stallion.
    special_gift: This gift... it feels like the wind on the open plains. I'll carry
      it in my mane.
    ascension_pre_ceremony: The {name} kneels heavily, hoof striking earth. 'Lead
      stallion, I feel the horizon calling but my hooves are hobbled. Shatter these
      bounds and I will outrun the wind for you.'
    ascension_post_ceremony: The {stone} explodes into a galloping starlight herd!
      {name} rears with a triumphant whinny as power courses through her legs. 'No
      fence can hold me! Goodbye, Level {old_cap}!'
    is_defeated: The {name} collapses onto her side, legs trembling. 'I can't... carry
      on... the herd must go on without me...'
    is_recovered: She scrambles to her hooves and shakes out her mane. 'I'm back on
      my feet! Let's make up for lost ground!'

moth_girl_flutterer:
  name: Moth Girl Flutterer
  race: Fey
  level: 12
  base_hp: 65
  mods:
    Strength: 2
    Constitution: 2
    Dexterity: 6
    Wisdom: 3
    Learning: 3
    Charisma: 4
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} flutters her wings, keeping her distance. 'You are
      not... bright enough for me yet. I need to know you are the light I seek.'
    recruit_accepted: The {name} drifts closer, wing-dust shimmering like starlight.
      'Your warmth calls to me. I will follow your flame anywhere, even into darkness.'
    capture: The {name} circles you, wing-dust sparkling. 'Your light... it is warmer
      than the moon, {player}.'
    house_talk_low: She flutters near, then retreats. 'You flicker like a candle in
      the wind. Steady yourself.'
    house_talk_mid: She lands on your shoulder, wings softly brushing your neck. 'You
      are a pleasant glow. Tell me about your day?'
    house_talk_high: She dances around you, leaving a trail of glowing dust. 'You
      are the brightest star in my sky! I want to hear everything about you!'
    house_talk_max: She settles in your lap, her wings folding. 'Your light is my
      home. I never want to fly elsewhere.'
    house_talk_engaged_1: The {name} flutters around you, leaving trails of glowing
      dust that shape into a heart. 'You're my eternal flame, and I'll dance around
      you until the stars go out.'
    house_talk_engaged_2: The {name} settles in your palm, wings soft against your
      skin. 'Your light warms me from the inside. I never knew love could be this
      bright.'
    house_gift_love: She shimmers with joy. 'Oh, it's beautiful! It shines like the
      moon – I will keep it near my heart!'
    house_gift_hate: She dims, disappointed. 'It's... not glowing. I need things that
      shine.'
    house_buff: She sprinkles silver dust over you. 'May your path always be lit,
      even in the darkest night.'
    house_bond_kiss: She flutters up and presses her lips to yours – gentle as a moth's
      wing. 'Now you are my eternal flame.'
    house_recruit_again: She buzzes with excitement. 'I've been waiting for your light!
      Take me with you!'
    engaged: You are the flame I will circle forever. Yes, let me be yours, my eternal
      light.
    special_gift: It glows... almost as bright as you. I will keep it close when night
      falls.
    ascension_pre_ceremony: The {name} alights before you, wings dusted with silver.
      'My flame... I feel a shadow on my wings. Will you burn it away so I can shine
      brighter for you?'
    ascension_post_ceremony: The {stone} bursts into a spiral of moonbeams! {name}'s
      wings unfurl in prismatic glory, leaving trails of stardust. 'The night just
      became day! Level {old_cap}... forgotten.'
    is_defeated: Her glow gutters like a dying candle, wings too weak to lift. 'Too
      dark... can't find your light...'
    is_recovered: A fresh dusting of silver light coats her wings. 'The flame is back!
      I can see you clearly now!'

slime_girl:
  name: Slime Girl
  race: Elemental
  level: 12
  base_hp: 88
  mods:
    Strength: 3
    Constitution: 6
    Dexterity: 4
    Wisdom: 2
    Learning: 3
    Charisma: 2
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} bounces uncertainly, shape shifting. 'Bloop... You're
      not squishy-familiar yet. More play first? Bloop-bloop?'
    recruit_accepted: The {name} surges forward, wrapping around your arm in a cool,
      gelatinous hug. 'Bloop! You feel like home! Let's go together, go together!'
    capture: The {name} surges into your arms, jiggling happily. 'Bloop! You caught
      the best prize! Squish!'
    house_talk_low: She wobbles in place, a bit shy. 'Bloop... you're stiff. Relax?'
    house_talk_mid: She bounces closer, jiggling. 'Bloop-bloop! You're fun! Squish-squish?'
    house_talk_high: She wraps around your hand, warm and happy. 'Bloop! Your presence
      makes me giggle inside!'
    house_talk_max: She envelops you in a cool, loving embrace. 'Bloop... you are
      my home. I never want to let go.'
    house_talk_engaged_1: The {name} wobbles happily, forming a heart shape with a
      translucent band inside. 'Bloop! We're squished together forever! My goo has
      never been this happy!'
    house_talk_engaged_2: The {name} wraps around your hand, cool and squishy, pulsing
      gently. 'Bloop-bloop... I want to hear all your dreams so I can squish them
      into reality.'
    house_gift_love: She absorbs the gift with a happy gurgle. 'Bloop! It's squishy
      and tasty! Perfect!'
    house_gift_hate: She spits it out, confused. 'Bloop... yucky. Not squishy at all.'
    house_buff: She squishes against you, leaving a glossy coat. 'Bloop! You're slippery
      now – hard to catch!'
    house_bond_kiss: She forms a gel-like mouth and gives you a gooey kiss. 'Bloop~
      Now you're part of me!'
    house_recruit_again: She bounces eagerly. 'Bloop! Let's squish together again!'
    engaged: Bloop-bloop! You want to squish with me forever? This is the happiest
      squish ever! Yes!
    special_gift: Ooh, a shiny squishy thing! I'll absorb it and keep it safe inside
      me, bloop!
    ascension_pre_ceremony: The {name} wobbles with determination, forming a heart
      shape. 'Bloop... I feel squishy but limited. Break the bubble so I can be the
      biggest, happiest slime for you!'
    ascension_post_ceremony: The {stone} pops like a soap bubble into a rainbow of
      goo! {name} expands joyfully, shimmering with new colors. 'Bloop! Level {old_cap}
      is squished! I'm free!'
    is_defeated: Her form loses shape, spreading into a weak puddle. 'Bloo... too
      runny... can't hold together...'
    is_recovered: She draws herself back into a bouncy blob and jiggles. 'Bloop! All
      squished back together! Let's play!'

lamia_constrictor:
  name: Lamia Constrictor
  race: Lizardfolk
  level: 13
  base_hp: 76
  mods:
    Strength: 5
    Constitution: 3
    Dexterity: 5
    Wisdom: 3
    Learning: 2
    Charisma: 3
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} coils her tail, tilting her head with a sly smile.
      'Mmm, you are interesting... but I prefer to coil around someone I truly know,
      darling.'
    recruit_accepted: The {name} slithers close, wrapping her tail around your waist
      — warm, secure, almost possessive. 'You are mine now. And I am yours. Don't
      forget it.'
    capture: The {name} wraps her tail around you — gentle, not trapping. 'You caught
      me, darling. Now... what will you do with me?'
    house_talk_low: She circles you, watching. 'You're tense. I could help with that...
      if you trust me.'
    house_talk_mid: She rests her head on your shoulder, tail loose. 'You're not bad
      company. Tell me a secret?'
    house_talk_high: She coils around you in a gentle hug. 'You make me feel safe,
      little one. Stay with me.'
    house_talk_max: She wraps you fully, whispering in your ear. 'You are my prey
      and my partner. I will never let go.'
    house_talk_engaged_1: The {name} coils loosely around you, tail tip flicking affectionately.
      'My darling mate, every scale on my body hums with your name. Stay wrapped with
      me a while longer.'
    house_talk_engaged_2: The {name} rests her chin on your shoulder, a sly but warm
      smile. 'I used to coil around prey; now I only coil around my beloved. You've
      domesticated a predator.'
    house_gift_love: She hisses with pleasure, clutching the gift. 'Ooh, you know
      me so well. I'll treasure this.'
    house_gift_hate: She pushes it away with her tail. 'This... does not suit me.
      Try again.'
    house_buff: She breathes warm air over you, a soothing heat. 'My warmth will protect
      you from cold and fear.'
    house_bond_kiss: She cups your face and kisses you deeply. 'Now you are truly
      caught in my coils.'
    house_recruit_again: She slithers forward, a hungry glint in her eye. 'Ready for
      round two, darling? Let's hunt.'
    engaged: You want to be wrapped in my coils for all time, darling? Then I shall
      never let you go... my mate.
    special_gift: A treasure for my hoard? It is almost as precious as you. I'll guard
      it with my life.
    ascension_pre_ceremony: The {name} coils at your feet, head bowed. 'Darling...
      my scales itch with unrealized potential. Use the stone and I will wrap you
      in power no enemy can escape.'
    ascension_post_ceremony: The {stone} hisses, releasing a serpentine aurora! {name}'s
      tail lengthens and shimmering scales blaze. 'The old limit has shed its skin!
      Level {old_cap} is gone, darling.'
    is_defeated: Her coils go limp and she hisses weakly. 'S-such a... poor hunter
      I am... forgive me, darling...'
    is_recovered: She flexes her tail and a new gleam enters her eye. 'That was just
      a warm-up, darling. Now the real hunt begins.'

lizard_queen:
  name: Lizard Queen
  race: Lizardfolk
  level: 14
  base_hp: 130
  mods:
    Strength: 3
    Constitution: 6
    Dexterity: 3
    Wisdom: 3
    Learning: 2
    Charisma: 5
  boss: true
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} reclines on her tail, unimpressed. 'A queen does not
      serve a commoner. Show me you are a ruler worth kneeling beside.'
    recruit_accepted: The {name} rises with regal poise, offering a clawed hand. 'You
      have proven yourself a worthy sovereign. I shall lend you my scales and my crown.'
    capture: The {name} hisses, then lowers her crown. 'You have defeated a queen.
      Treat her well, {player}, or face her wrath.'
    house_talk_low: She looks down her snout. 'You are beneath me. Speak only when
      spoken to.'
    house_talk_mid: She acknowledges you with a nod. 'You have earned a fraction of
      my attention. Use it wisely.'
    house_talk_high: She invites you to sit beside her. 'You show promise. Tell me
      of your conquests.'
    house_talk_max: She lays her head in your lap, regal yet vulnerable. 'You are
      the only one I would kneel for.'
    house_talk_engaged_1: The {name} adjusts her crown, then places a smaller one
      on your head. 'My king, my equal — together our reign will never set. What kingdom
      shall we discuss today?'
    house_talk_engaged_2: The {name} lounges beside you, regal but at ease. 'Even
      a queen needs a consort to share the burdens of power. I'm grateful it's you.'
    house_gift_love: She accepts with a dignified nod. 'A worthy offering. You are
      learning your place.'
    house_gift_hate: She scoffs. 'This is trash. Do not waste my time.'
    house_buff: She raises her claws and intones a royal blessing. 'May your victories
      be many.'
    house_bond_kiss: She presses her lips to yours – a queen's seal of devotion. 'Now
      you are mine, and I am yours.'
    house_recruit_again: She rises, scales gleaming. 'You have summoned your queen.
      Let us reclaim glory.'
    engaged: You ask a queen to share her throne forever? ... Then I shall make you
      my king. Rule beside me, my equal.
    special_gift: This tribute... it is fit for a pharaoh. I will place it in my royal
      vault.
    ascension_pre_ceremony: The {name} kneels with a ruler's grace, her crown tilted.
      'Even a queen must evolve. Anoint me with ascension, consort, and our reign
      shall be eternal.'
    ascension_post_ceremony: The {stone} roars into a column of sunfire! {name}'s
      scales gleam like obsidian and gold as she rises. 'My kingdom grows! Level {old_cap}
      was a mere stepping stone.'
    is_defeated: The {name} slumps upon her throne, crown askew. 'A queen... fallen...
      how shameful...'
    is_recovered: She rights her crown and stands tall. 'The queen rises. Kneel not
      in sorrow but in readiness.'

mimic_girl:
  name: Mimic Girl
  race: Abomination
  level: 14
  base_hp: 95
  mods:
    Strength: 7
    Constitution: 4
    Dexterity: 5
    Wisdom: 2
    Learning: 2
    Charisma: 2
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} grins, revealing rows of sharp teeth. 'Hehe~ You're
      not interesting enough to open my lid for. Try again later, maybe~'
    recruit_accepted: The {name}'s tongue lolls out as she pounces into your arms.
      'Jackpot! You're the best treasure I've ever found. Don't go hiding from me~'
    capture: The {name} snaps her lid shut, then opens it with a giggle. 'Hehe~ You
      actually caught me! Treasure secured~'
    house_talk_low: She snaps her jaws playfully. 'You look tasty... but I'm bored.
      Entertain me!'
    house_talk_mid: She hops closer, tongue out. 'Hehe~ You're fun! Tell me a joke!'
    house_talk_high: She nuzzles you, licking your cheek. 'Mmm~ You're my favourite
      treasure! Stay with me!'
    house_talk_max: She curls around you, purring. 'I've found the best treasure of
      all – you. I'll protect you forever~'
    house_talk_engaged_1: The {name} opens her lid, revealing a plush heart-shaped
      cushion inside. 'Hehe~ I've made a special spot just for you, my best treasure!
      No one else gets in.'
    house_talk_engaged_2: The {name} transforms into a small treasure chest, a ring
      latch on top. 'I'm the chest that holds your heart, and you've got the key,
      nya~'
    house_gift_love: She devours it with glee. 'YUM! You know what I like! More, more!'
    house_gift_hate: She spits it out, disgusted. 'Blech! That's not treasure!'
    house_buff: She gives you a slobbery lick. 'There! Now you're lucky! Don't ask
      how it works~'
    house_bond_kiss: She turns into a small chest, pops open, and gives you a kiss
      from inside. 'Hehe~ Surprise! Now you're mine!'
    house_recruit_again: She transforms into a chest and leaps at you. 'Surprise!
      I'm ready to go again!'
    engaged: Hehe~ You want to be my permanent treasure? Then I'll never open for
      anyone else! You're my best loot!
    special_gift: Is it edible? No? Still shiny! I'll keep it in my chest, right next
      to my heart.
    ascension_pre_ceremony: The {name} snaps her lid shut, then peeks out with a giggle.
      'Hehe~ I've got a treasure inside that's begging to grow. Crack the stone and
      I'll be the best loot you ever had!'
    ascension_post_ceremony: The {stone} shatters with a jackpot chime, revealing
      a mimic-shaped constellation! {name} emerges sparkling, tongue lolling. 'Jackpot!
      Level {old_cap}? Eaten up!'
    is_defeated: The {name} clunks onto her side, lid creaking open weakly. 'N-no
      fair... my treasure... keep it safe...'
    is_recovered: She snaps shut, then pops open with renewed energy. 'Hehe~ I'm back
      and hungrier than ever!'

umbral_weaver:
  name: Umbral Weaver
  race: Shadow
  level: 14
  base_hp: 85
  mods:
    Strength: 2
    Constitution: 3
    Dexterity: 7
    Wisdom: 4
    Learning: 3
    Charisma: 3
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} melts into the shadows, her voice drifting from the
      darkness. 'You are not yet woven into my web. Come closer... if you dare.'
    recruit_accepted: The {name} steps from the gloom, shadow-threads binding your
      hands together. 'You have become the thread I cannot cut. We are bound, little
      moth.'
    capture: The {name} steps from the shadows, threads trailing behind her. 'You
      snared the snarer. Impressive... little moth.'
    house_talk_low: She whispers from the corner. 'You are loud. Learn to be quiet,
      and I might speak.'
    house_talk_mid: She appears beside you, a faint smile. 'You are learning. Would
      you like to see the patterns I weave?'
    house_talk_high: She wraps a shadow-thread around your finger. 'You are part of
      my tapestry now. I will tell you secrets.'
    house_talk_max: She holds you in the darkness, warm and safe. 'You are my light
      in the void. I will never let you fade.'
    house_talk_engaged_1: The {name} weaves shadow-threads that form a gleaming ring
      pattern around your finger. 'In the tapestry of fate, our threads are now knotted
      together. I can see our future, little moth.'
    house_talk_engaged_2: The {name} emerges from the darkness, her touch gentle.
      'My shadows are no longer lonely. You are the light that I will keep woven into
      my very soul.'
    house_gift_love: She accepts it with a shadowy hand, and it melts into her form.
      'A gift for the weaver? You are kind.'
    house_gift_hate: She lets it drop, untouched. 'It is too bright. It hurts.'
    house_buff: She spins a cloak of shadows around you. 'Now the darkness will hide
      and shield you.'
    house_bond_kiss: She steps from the dark and presses her lips to yours – cool
      as night. 'Now you are bound to the shadow.'
    house_recruit_again: She weaves a portal of darkness. 'Step through – I will guide
      you again.'
    engaged: You wish to be woven into my tapestry for eternity? Then you shall be
      my brightest thread, little moth.
    special_gift: This gift... it shines in the dark. I will spin a web just to display
      it.
    ascension_pre_ceremony: The {name} weaves a sigil of darkness, voice a whisper.
      'The web of fate tightens... Cut these old threads, little moth, so I may weave
      a grander tapestry for you.'
    ascension_post_ceremony: The {stone} unravels into shadowy filaments that sew
      themselves into {name}'s form. The darkness deepens, then ignites with starry
      nodes. 'My new web is complete. Level {old_cap}... discarded.'
    is_defeated: The shadows around her fray and thin until she is barely a silhouette.
      'The pattern... is breaking... little moth...'
    is_recovered: New threads spin out from the darkness, forming a stronger web.
      'The tapestry is repaired. I will not unravel again.'

winter_fairy:
  name: Winter Fairy
  race: Fey
  level: 14
  base_hp: 70
  mods:
    Strength: 2
    Constitution: 2
    Dexterity: 6
    Wisdom: 4
    Learning: 3
    Charisma: 5
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} flits away, leaving a trail of frost. 'Too warm, too
      fast. I need time to thaw... or you'll just melt my heart too quickly.'
    recruit_accepted: The {name} lands on your shoulder, her breath frosting your
      cheek. 'You melt the ice without breaking it. That is rare. I will stay... for
      now.'
    capture: The {name} alights on your finger, frost blooming where she touches.
      'You are warm, {player}... but not burning. I will stay.'
    house_talk_low: She hovers just out of reach, frost in the air. 'You are too warm.
      I need distance.'
    house_talk_mid: She lands on your palm, ice melting slightly. 'You are not so
      bad. Tell me of summer?'
    house_talk_high: She curls up in your hood, her chill a comfort. 'You are my winter
      sun. Stay with me?'
    house_talk_max: She presses her cold cheek to yours. 'You are the warmth I never
      knew I needed. I love you.'
    house_talk_engaged_1: The {name} flits close, painting frost hearts on the window.
      'My winter sun, I've learned to love warmth because of you. I'll never let the
      cold come between us.'
    house_talk_engaged_2: The {name} lands on your nose, leaving a delicate snowflake
      kiss. 'Every snowflake that falls is a reminder of our bond. I'll blanket the
      world in white just for you.'
    house_gift_love: She hugs it, leaving a frost pattern. 'It's perfect! It reminds
      me of icicles!'
    house_gift_hate: She drops it, shivering. 'This is too hot. Take it away.'
    house_buff: She breathes a frosty mist over you. 'May your steps be silent and
      your heart cold as ice.'
    house_bond_kiss: She flutters up and kisses you – cold and sweet as fresh snow.
      'Now you are winter's chosen.'
    house_recruit_again: She flits around you, leaving frost trails. 'I've been waiting
      for the cold to return. Let's go!'
    engaged: You... you would thaw my heart forever? I... I thought I'd never feel
      such warmth. Yes, my winter sun.
    special_gift: It glitters like frost. I will keep it in my ice palace, never to
      melt.
    ascension_pre_ceremony: The {name} flits down, leaving a trail of frost. 'My heart
      is frozen in old ice. Please... thaw these chains with the stone, so I may become
      a blizzard for you.'
    ascension_post_ceremony: The {stone} shatters into a flurry of diamond snow! {name}
      spins, her form growing sharp and crystalline. 'The eternal winter has arrived!
      Level {old_cap} is buried.'
    is_defeated: She falls like a single snowflake, barely visible. 'So... cold...
      even my frost is fading...'
    is_recovered: She bursts upward in a swirl of ice crystals. 'The blizzard returns!
      Nothing can freeze me out of this fight!'

holstaur_brawler:
  name: Holstaur Brawler
  race: Beast
  level: 15
  base_hp: 115
  mods:
    Strength: 6
    Constitution: 6
    Dexterity: 4
    Wisdom: 2
    Learning: 2
    Charisma: 3
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} flexes her muscles, snorting. 'You look scrawny. I
      don't throw hooves for someone I could bench-press. Show me some grit!'
    recruit_accepted: The {name} slaps your back with enough force to stagger you,
      laughing heartily. 'Haha! You got spirit! Let's crack some skulls together,
      partner!'
    capture: The {name} snorts, then grins and pounds her chest. 'Hah! You got me,
      {player}! Best catch of the day!'
    house_talk_low: She cracks her knuckles. 'Talk? I'd rather wrestle. But fine,
      make it quick.'
    house_talk_mid: She grins, slapping your shoulder. 'You're tougher than you look!
      Let's arm-wrestle!'
    house_talk_high: She throws an arm around you. 'You're my favourite sparring buddy!
      Let's grab a drink!'
    house_talk_max: She hugs you, nearly crushing you. 'I'd take a thousand hits for
      you. You're my herd.'
    house_talk_engaged_1: The {name} flexes, then lifts you easily in a bear hug.
      'Ha! My partner for life! Nothing can break us — I'll crush any trouble that
      comes our way!'
    house_talk_engaged_2: The {name} leans her head against yours, her strength gentle.
      'You're the soft spot in my heart, sweetcheeks. I'll always protect that.'
    house_gift_love: She bellows with joy, tossing it in the air. 'I LOVE IT! Let's
      celebrate!'
    house_gift_hate: She snorts, unimpressed. 'This is useless. Can I eat it?'
    house_buff: She flexes and gives you a hearty pat. 'There! Now you've got the
      strength of a bull!'
    house_bond_kiss: She plants a kiss on your forehead, a bit too hard. 'Mwah! Now
      you're mine, partner!'
    house_recruit_again: She stamps her hoof, ready for action. 'Time to brawl again!
      Let's go!'
    engaged: You wanna be my partner for life? Then let's crush every challenge together!
      I'll always have your back, sweetcheeks.
    special_gift: Whoa, this is awesome! I'll polish it every day and show it off
      at the tavern!
    ascension_pre_ceremony: The {name} slams her fists together, snorting. 'I've been
      pumping iron but my muscles are capped! Smash that limit with the stone, partner,
      and I'll be your unbreakable wall!'
    ascension_post_ceremony: The {stone} detonates like a powder keg! {name} bellows
      as her physique surges with raw power. 'I could bench-press a mountain! Level
      {old_cap} is dust!'
    is_defeated: She drops to one knee, arms shaking. 'D-damn... they punch harder
      than a stampede... I need a breather...'
    is_recovered: She pops back up and slams her fists together. 'Round two! I'm just
      getting warmed up!'

gargoyle_watcher:
  name: Gargoyle Watcher
  race: Construct
  level: 16
  base_hp: 120
  mods:
    Strength: 6
    Constitution: 8
    Dexterity: 2
    Wisdom: 2
    Learning: 3
    Charisma: 3
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} folds her stone wings, immovable. 'I have watched a
      thousand seasons. You are but a flicker. Why should I leave my perch?'
    recruit_accepted: The {name} cracks her stone knuckles, eyes gleaming with ancient
      life. 'You have earned the gaze of the eternal. I shall guard you as I guard
      the spires.'
    capture: The {name} cracks her stone wings, then nods. 'A thousand years I watched.
      Finally... someone worth watching with.'
    house_talk_low: She stands motionless, eyes following you. 'You move too fast.
      I watch.'
    house_talk_mid: She shifts slightly, a grinding sound. 'You are... interesting.
      Tell me of the world beyond my perch.'
    house_talk_high: She sits beside you, stone warm from the sun. 'You have become
      my favourite sight. Stay a while.'
    house_talk_max: She takes your hand, her grip solid but gentle. 'You are the only
      thing I will leave my perch for.'
    house_talk_engaged_1: The {name} perches motionless, but her eyes follow you with
      eternal devotion. 'I have watched civilizations crumble, but my vigil over you
      will outlast time itself.'
    house_talk_engaged_2: The {name} cracks a rare, stony smile, offering her hand.
      'The stone that encases my heart now beats only for you. Will you sit with me
      on this perch?'
    house_gift_love: She examines it, then nods once. 'A worthy tribute. I shall keep
      it always.'
    house_gift_hate: She stares at it, unmoved. 'It is meaningless. Remove it.'
    house_buff: She touches your brow with a stony finger. 'May you be as enduring
      as stone.'
    house_bond_kiss: She bends down, her stone lips pressing against yours – cool
      and eternal. 'Now you are carved into my memory.'
    house_recruit_again: She spreads her wings, ready to descend. 'The time to watch
      is over. I will fight.'
    engaged: You would share your fleeting mortal life with this eternal stone? Then
      I shall watch over you until the spires crumble.
    special_gift: A relic? It is... meaningful. I will carve a niche for it in my
      perch.
    ascension_pre_ceremony: The {name} descends from her perch, wings grinding. 'I
      have watched eons pass without changing. It is time. Break the seal of stone
      and let me be more than a sentinel.'
    ascension_post_ceremony: The {stone} cracks, revealing a core of molten light
      that flows over {name}. Her stone skin shines like polished marble. 'I am awake!
      Level {old_cap} is ancient history.'
    is_defeated: She cracks in several places, one wing breaking off. 'The stone...
      crumbles... but I will... watch...'
    is_recovered: The broken pieces fuse back together with a grind. 'Stone endures.
      I am whole again.'

vampire_seductress:
  name: Vampire Seductress
  race: Vampire
  level: 16
  base_hp: 100
  mods:
    Strength: 3
    Constitution: 3
    Dexterity: 6
    Wisdom: 3
    Learning: 3
    Charisma: 6
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} fans herself with a lace glove, amused. 'A mere mortal
      asking a lady of the night to serve? Adorable. Come back when you're... tastier.'
    recruit_accepted: The {name} draws close, fangs glinting with playful menace.
      'Mmm, you have bite. I think I'll keep you. Let's see how deep this bond runs,
      my pet.'
    capture: The {name} fans herself, then smiles with fangs showing. 'Mmm, such persistence,
      {player}. You may keep me... for now.'
    house_talk_low: She inspects her nails. 'Oh, it's you. I suppose you'll want to
      chat. How droll.'
    house_talk_mid: She offers you a glass of something red. 'You're growing on me.
      Like a fine wine.'
    house_talk_high: She leans close, fangs grazing your ear. 'You are the most delicious
      mortal I've met. Tell me more about yourself.'
    house_talk_max: She cradles your face, eyes soft. 'I have walked the night for
      centuries, but you are the dawn I never expected.'
    house_talk_engaged_1: The {name} swirls a glass of something crimson, then toasts
      you. 'My pet, my consort — your heartbeat is the only music I ever want to dance
      to.'
    house_talk_engaged_2: The {name} caresses your cheek, fangs retracted. 'I've tasted
      centuries, but nothing as intoxicating as your love. Let's linger in this eternal
      night.'
    house_gift_love: She gasps, genuinely surprised. 'Oh my! This is exquisite. You
      have excellent taste.'
    house_gift_hate: She raises an eyebrow. 'This? Really? I am a creature of the
      night, not a common merchant.'
    house_buff: She whispers a dark blessing, a shiver of power. 'May the shadows
      embrace you and the night protect you.'
    house_bond_kiss: She pulls you into a deep, lingering kiss. 'Now you are mine,
      body and soul.'
    house_recruit_again: She extends her hand, a sly smile. 'Come, my pet. The night
      awaits us.'
    engaged: A mortal asking for an eternal bond? ... Darling, you are the first to
      make my undead heart flutter. Yes, my pet.
    special_gift: Oh my, this is exquisite. I shall wear it to our eternal nights.
    ascension_pre_ceremony: The {name} fans herself, eyes glowing. 'A lady's charm
      should know no bounds. Use the stone, my pet, and I shall be an eternal night
      that swallows all light.'
    ascension_post_ceremony: The {stone} dissolves into a sanguine mist that coils
      around {name}. Her fangs gleam, and her presence intensifies. 'Darker and deadlier...
      Level {old_cap} is a quaint memory.'
    is_defeated: She collapses onto a chaise, a hand to her forehead. 'How... ungraceful...
      a lady should never look this defeated...'
    is_recovered: She rises gracefully, straightening her glove. 'That was merely a
      pause. Now, where were we, my pet?'

yuki_onna:
  name: Yuki-onna
  race: Elemental
  level: 17
  base_hp: 105
  mods:
    Strength: 3
    Constitution: 4
    Dexterity: 3
    Wisdom: 4
    Learning: 6
    Charisma: 5
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} gazes through you, her beauty cold and distant. 'I
      have buried wanderers in snow for less. Leave me before I forget your warmth.'
    recruit_accepted: The {name}'s frozen lips curve into a fragile smile. 'You are
      the first ember I did not extinguish. Walk with me... but do not melt away.'
    capture: The {name} drifts closer, snow swirling around her. 'You did not freeze,
      {player}. Perhaps... you are worth the thaw.'
    house_talk_low: She stands apart, a cold wind between you. 'You are warm. I do
      not like it.'
    house_talk_mid: She comes a step closer, frost melting. 'You are... not unpleasant.
      Tell me of the sun.'
    house_talk_high: She lets you touch her hand, ice and fire. 'You are the only
      one who does not fear me. I... like that.'
    house_talk_max: She rests her head on your shoulder, cold tears. 'I have found
      my warmth. Please never leave.'
    house_talk_engaged_1: The {name} holds your hands, her chill softening into a
      gentle coolness. 'Your warmth has become my home. I will shelter you from every
      storm, my love.'
    house_talk_engaged_2: The {name} builds a small ice sculpture of the two of you
      holding hands. 'It will never melt, just like my feelings. I am no longer alone
      in the snow.'
    house_gift_love: She accepts it, a faint smile. 'It is beautiful. I will keep
      it frozen in my heart.'
    house_gift_hate: She lets it fall, untouched. 'It is too hot. It burns.'
    house_buff: She blows a flurry of snow over you. 'May the cold never touch you,
      and your enemies freeze.'
    house_bond_kiss: She presses her icy lips to yours – a kiss that thaws her heart.
      'Now you are my warmth.'
    house_recruit_again: She drifts forward, snow swirling. 'I have waited for you.
      Let us walk together again.'
    engaged: You... you would be my warmth forever? I was afraid I would freeze you,
      but you melt my fears. Yes, my love.
    special_gift: This is... warm. But I will treasure it, for it came from you.
    ascension_pre_ceremony: The {name} bows, snowflakes melting on her lashes. 'My
      heart is frozen at a threshold. Use the stone to shatter that ice, so my love
      may fall like endless snow for you.'
    ascension_post_ceremony: The {stone} bursts into a silent blizzard! {name} rises,
      her form wreathed in auroral frost. 'The cold is now my servant. Level {old_cap}
      is frozen solid.'
    is_defeated: Her form grows thin and transparent, snow piling around her. 'I'm...
      melting... don't let me disappear...'
    is_recovered: She solidifies, fresh frost sparkling. 'You called me back. I will
      always return to your warmth.'

amazon_warrior:
  name: Amazon Warrior
  race: Human
  level: 18
  base_hp: 125
  mods:
    Strength: 6
    Constitution: 3
    Dexterity: 6
    Wisdom: 3
    Learning: 3
    Charisma: 5
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} plants her spear in the ground, arms crossed. 'I follow
      no war-leader who has not bled beside me. Earn your shield, stranger.'
    recruit_accepted: The {name} raises her spear to the sky with a fierce war cry.
      'You fight with honor! I will stand in your shield-wall — sisters in battle!'
    capture: The {name} plants her spear in the ground, then salutes. 'You fought
      well, {player}. I will follow your banner.'
    house_talk_low: She grips her spear, wary. 'You are not a warrior. Speak quickly.'
    house_talk_mid: She relaxes slightly, leaning on her spear. 'You have courage,
      I'll give you that. Let's spar sometime.'
    house_talk_high: She claps you on the back. 'You are a worthy comrade! I would
      charge into battle with you any day!'
    house_talk_max: She kneels, offering you her spear. 'You are my queen. I will
      fight and die for you.'
    house_talk_engaged_1: The {name} sharpens her spear, then glances up with a fierce
      but loving smile. 'My queen, my battle-sister — our war cry will echo through
      eternity.'
    house_talk_engaged_2: The {name} presents you with a shield she crafted. 'I forged
      this with thoughts of you. May it guard our future together.'
    house_gift_love: She grins, holding it high. 'A fine weapon! I will use it to
      crush our enemies!'
    house_gift_hate: She tosses it aside. 'This is decoration, not a tool of war.'
    house_buff: She shouts a battle cry, infusing you with courage. 'May your strikes
      be true and your heart fearless!'
    house_bond_kiss: She pulls you into a fierce kiss. 'Now you are my battle‑sister
      – and more.'
    house_recruit_again: She plants her spear, ready. 'I have rested enough. Let us
      fight again!'
    engaged: You would make me your sworn shield-sister for life? Then let us charge
      into eternity together, my queen!
    special_gift: A warrior's token! I shall carry it into every battle, and it will
      remind me of you.
    ascension_pre_ceremony: The {name} plants her spear, kneeling. 'Battle-sister,
      I have honed my body to its limit. Grant me ascension so I may shatter that
      limit and fight beside you forever.'
    ascension_post_ceremony: The {stone} erupts in a war cry of light! {name} leaps
      up, spear blazing. 'Victory is mine! Level {old_cap} has fallen in battle!'
    is_defeated: She drops her spear and sinks to her knees, bloodied but unbowed.
      'I... have failed you. A warrior's worst shame...'
    is_recovered: She picks up her spear and stands tall. 'Shame washed away by blood.
      I will fight again!'

banshee_wailer:
  name: Banshee Wailer
  race: Undead
  level: 18
  base_hp: 110
  mods:
    Strength: 4
    Constitution: 4
    Dexterity: 5
    Wisdom: 3
    Learning: 3
    Charisma: 7
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} covers her mouth, eyes wet with sorrow. 'I only wail
      for the dead... and you are not yet my reason to mourn. Go.'
    recruit_accepted: The {name} takes your hand, her voice soft for the first time.
      'You have silenced my grief. I will sing songs of life for you instead... until
      the end.'
    capture: The {name} covers her mouth, tears falling. 'You heard my wail... and
      did not run. Thank you, {player}.'
    house_talk_low: She sobs quietly. 'Why do you stay? I bring only sorrow.'
    house_talk_mid: She looks up, a faint smile. 'You are... a strange comfort. Tell
      me a happy story?'
    house_talk_high: She takes your hand, her touch cold but gentle. 'You have brought
      light to my darkness. I will sing for you.'
    house_talk_max: She wraps her arms around you, her wail a whisper. 'You are my
      reason to live. I will never wail again.'
    house_talk_engaged_1: The {name} hums a soft melody, her tears now glistening
      with joy. 'My melody of sorrow has become a lullaby of love. You are my eternal
      verse.'
    house_talk_engaged_2: The {name} presses your hand to her chest, where a faint
      heartbeat echoes. 'I never thought I'd feel this again. You've given me life
      beyond death.'
    house_gift_love: She clutches it, tears of joy. 'A gift... for me? I have not
      received one in ages. Thank you.'
    house_gift_hate: She pushes it away, trembling. 'It reminds me of what I have
      lost. Please take it back.'
    house_buff: She hums a soothing melody, a balm to your soul. 'May peace follow
      you wherever you go.'
    house_bond_kiss: She presses her lips to yours – cold, but full of life. 'Now
      you have stolen my heart.'
    house_recruit_again: She wipes her tears, a smile breaking through. 'I am ready
      to sing again – for you.'
    engaged: You... you would give me a reason to sing forever? I never thought I'd
      find such joy. Yes, my melody.
    special_gift: A gift that brings a smile... I haven't smiled in centuries. Thank
      you.
    ascension_pre_ceremony: The {name} weeps silver tears, voice trembling. 'My wail
      could only mourn... but I wish to sing. Use the stone, please, and let me cry
      tears of joy.'
    ascension_post_ceremony: The {stone} shatters with a note so pure it becomes a
      melody. {name}'s tears turn into glowing motes; she smiles. 'I can sing again...
      Level {old_cap} is a forgotten dirge.'
    is_defeated: She covers her face and wails a soft, sorrowful note. 'Again... I
      bring only loss...'
    is_recovered: She lifts her head and hums a fragile tune. 'But you still stand
      beside me. I'll sing for the living now.'

neko_ninja:
  name: Neko Ninja
  race: Beast
  level: 18
  base_hp: 92
  mods:
    Strength: 5
    Constitution: 5
