    Charisma: 6
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} adjusts her golden headdress, unimpressed. 'I ruled
      dynasties before your ancestors were born. A pharaoh kneels for no peasant.'
    recruit_accepted: The {name} unwraps a strip of linen, pressing it into your palm
      like a sacred relic. 'You have found the heart beneath the bandages. Rule beside
      me, my king.'
    capture: The {name} unwraps a hand, pressing it to your cheek. 'You have found
      the treasure of the tomb, {player}. Do not lose it.'
    house_talk_low: She looks down her nose. 'You are not worthy of my time. Leave.'
    house_talk_mid: She acknowledges you with a slight nod. 'You are... tolerable.
      Speak.'
    house_talk_high: She invites you to sit on her throne. 'You have earned a place
      beside me. Tell me of your kingdom.'
    house_talk_max: She unwraps her face, revealing a gentle smile. 'You are my heart,
      my king. I will rule eternity with you.'
    house_talk_engaged_1: The {name} adjusts your royal headpiece, bandages soft.
      'My pharaoh, my heart. The sands of time cannot bury what we have; it will last
      beyond the pyramids.'
    house_talk_engaged_2: The {name} unrolls a papyrus scroll with hieroglyphs of
      your two names intertwined. 'I've written our legend. It will be read for millennia.'
    house_gift_love: She accepts it with royal grace. 'A fine tribute. I shall place
      it in my sarcophagus.'
    house_gift_hate: She drops it, disgusted. 'This is beneath a pharaoh. Take it
      away.'
    house_buff: She recites an ancient spell. 'May the sands protect you and the gods
      favor you.'
    house_bond_kiss: She kisses you, her bandages soft. 'Now you are bound to me for
      all time.'
    house_recruit_again: She rises, regal and powerful. 'I have awoken. Let us reclaim
      our glory.'
    engaged: You would share my sarcophagus for eternity? Then you shall be my pharaoh,
      my beloved.
    special_gift: A gift for the afterlife? It is worthy. I shall be buried with it,
      and think of you.
    ascension_pre_ceremony: The {name} unwraps a hand, offering a scroll. 'I was a
      pharaoh, yet bound by old magic. Use the stone to resurrect my full power and
      I shall rule beside you eternally.'
    ascension_post_ceremony: The {stone} crumbles into golden sand that flows into
      {name}'s bandages. Her eyes ignite with royal flame. 'The tomb is opened! Level
      {old_cap} is buried forever.'
    is_defeated: She slumps on her throne, bandages fraying. 'A pharaoh... fallen
      in dishonor...'
    is_recovered: She rises, new linen wrapping around her. 'The pharaoh is eternal.
      I return stronger.'

oni_bruiser:
