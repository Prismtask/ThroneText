    house_talk_max: She takes you in her arms, fire soft. 'You are my equal. I love
      you.'
    house_talk_engaged_1: The {name} sits on a throne of cooled lava, pulling you
      onto her lap. 'My consort, you have cooled my hellfire into a gentle warmth.
      Rule the abyss with me.'
    house_talk_engaged_2: The {name} summons a tiny, tame flame that forms a heart.
      'Even the flames of hell bend to my love for you. I'll reshape the underworld
      for our home.'
    house_gift_love: She accepts it, and it glows with her fire. 'A gift fit for an
      empress. You please me.'
    house_gift_hate: She incinerates it. 'Trash. Do not waste my time.'
    house_buff: She breathes a wave of power over you. 'May you burn bright and never
      be extinguished.'
    house_bond_kiss: She kisses you, and you taste the inferno. 'Now you are my consort
      in hell.'
    house_recruit_again: She rises, hellfire roaring. 'The abyss awaits. Let us rule
      together.'
    engaged: Mortal... you would rule the abyss with me forever? Then take my hand,
      and let the inferno forge our bond.
    special_gift: A gift from the mortal realm? It is... precious because it is from
      you.
    ascension_pre_ceremony: The {name} steps down from her throne of bone, fire simmering.
      'Even an empress can be chained by old pacts. Use the stone and I will rewrite
