    ascension_post_ceremony: The {stone} combusts into a spiral of embers that wrap
      around {name}. She pirouettes, now wreathed in eternal flame. 'The dance never
      ends! Level {old_cap} is ash.'
    is_defeated: Her flames sputter and go out, leaving her in the dark. 'My fire...
      it's gone... I'm cold...'
    is_recovered: A spark ignites in her palm, then flames roar back to life. 'The
      ember never dies. Our dance continues!'

succubus_seductress:
