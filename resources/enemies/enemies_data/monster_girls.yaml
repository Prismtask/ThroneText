    house_talk_engaged_1: The {name} pounds a fist into her palm, then grins. 'Hah!
      My battle partner for life! Together we'll smash every obstacle into dust!'
    house_talk_engaged_2: The {name} wraps an arm around you, surprisingly gentle.
      'I used to only care about smashing, but now I've got someone to protect. That's
