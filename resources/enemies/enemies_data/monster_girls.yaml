    capture: The {name} cuts her own thread, dropping into your arms. 'My web has
      a new center... and it is you, {player}.'
    house_talk_low: She weaves a small web, watching you. 'You are a fly in my web
      – do not struggle.'
    house_talk_mid: She offers you a silk‑woven flower. 'I made this for you. It is
      soft, like you.'
    house_talk_high: She wraps a strand around your finger. 'You are safe in my web.
      I will protect you.'
    house_talk_max: She holds you gently, silk all around. 'You are the center of
      my web. I will never let you fall.'
    house_talk_engaged_1: The {name} weaves a web between her fingers, forming a delicate
      ring. 'My precious fly, I've spun a silken future for us — soft, strong, and
      unbreakable.'
    house_talk_engaged_2: The {name} hangs a small diamond-like dew-drop in the center
      of her web, reflecting your face. 'Every morning I'll catch the sunlight for
      you.'
    house_gift_love: She examines it, then smiles. 'It is perfect. I will weave it
      into my web.'
    house_gift_hate: She cuts it away. 'It is coarse. It does not belong.'
    house_buff: She weaves a cloak of silk around you. 'May it shield you and ensnare
      your foes.'
    house_bond_kiss: She leans in, her fangs brushed against your lips. 'Now you are
      caught forever.'
    house_recruit_again: She spins a thread, pulling you closer. 'I missed you. Let
      us weave again.'
    engaged: You would be the center of my web forever? Then I shall weave a home
      around you, my precious fly.
    special_gift: This trinket... I'll hang it in the finest thread, a jewel for my
      web.
    ascension_pre_ceremony: The {name} dangles from a thread, fangs clicking. 'My
      silk can hold cities, but I sense a stronger weave. Use the stone, and I will
      cocoon our enemies in destiny.'
    ascension_post_ceremony: The {stone} unravels into glistening silk threads that
      weave into {name}'s carapace. Golden patterns emerge. 'Arachnae supreme! Level
      {old_cap} is just a loose thread.'
    is_defeated: Several legs buckle and silk strands snap. 'My web... torn... I can't
      hold you...'
    is_recovered: New silk flows, stronger than before. 'The web is repaired. I will
      never let you fall again.'

mummy_princess:
  name: Mummy Princess
  race: Undead
  level: 19
  base_hp: 130
  mods:
    Strength: 4
    Constitution: 5
    Dexterity: 4
    Wisdom: 3
