    capture: The {name} licks her lips seductively... 'Master~ I'll be good~'
    house_talk_low: She lounges, inspecting her nails. 'Oh, it's you. Boring as ever.'
    house_talk_mid: She purrs, leaning closer. 'You're getting interesting. Tell me
