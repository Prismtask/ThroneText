    ascension_post_ceremony: The {stone} shatters under her fist, unleashing a shockwave
      of demonic fire! Her horns glow, muscles rippling. 'Now I'm a true calamity!
      Level {old_cap}? Obliterated!'
    is_defeated: She crashes down, shaking the ground, and coughs. 'Hah... that... actually
