      'You've got the best lap for napping, and the best fights for stalking. I'm
      yours, nya~'
    capture: The {name} poofs out of smoke, landing in your arms. 'Nyahaha~ You caught
      the uncatchable! I guess I'm yours, nya~'
    house_talk_low: She appears on a shelf, tail twitching. 'Nya? You again? Make
      it quick.'
    house_talk_mid: She curls up beside you, purring. 'Nya~ You're not so bad. Tell
      me a secret?'
    house_talk_high: She nuzzles your hand, eyes half‑closed. 'Nya~ You're my favourite
      human. Let's play!'
    house_talk_max: She wraps around you, purring loudly. 'I will always be your shadow,
      nya. Always.'
    house_talk_engaged_1: The {name} poofs in front of you, a tiny bell on a ribbon
      around your wrist. 'Nya~ You're my purrmanent human now! I've marked you so
      everyone knows!'
    house_talk_engaged_2: The {name} curls up in your lap, purring rhythmically. 'Nya~
      I used to stalk shadows, but now I only stalk your lap. This is the best mission
      ever.'
    house_gift_love: She snatches it, rubbing against it. 'Nya! I love it! It's so
      shiny!'
    house_gift_hate: She sniffs it, then pushes it away. 'Nya... boring. I don't want
      it.'
    house_buff: She flicks a bell at you. 'Nya~ You're quick as a cat now!'
    house_bond_kiss: She gives you a quick lick on the cheek. 'Nya~ Now you're marked
      as my territory!'
    house_recruit_again: She poofs in front of you. 'Ready for more fun, nya? Let's
      go!'
    engaged: Nya~ You want to be my purrmanent human? Then I'll never leave your lap,
      nya! I love you!
    special_gift: Nya! Shiny and fun! I'll bat it around all night, thinking of you.
    ascension_pre_ceremony: The {name} poofs behind you, then kneels with a swish
      of tail. 'Nya~ I've reached my stealth cap! Break it with the stone so I can
      become a shadow that even shadows can't catch!'
    ascension_post_ceremony: The {stone} vanishes in a puff of smoke, and {name} reappears
      with twin tails of light. 'Nyahaha! I'm uncappable now! Level {old_cap} got
      pounced!'
    is_defeated: She vanishes into smoke, then reappears flat on the floor. 'Nya...
      that hurt... I lost my pounce...'
    is_recovered: She poofs upright and stretches. 'Nya! All nine lives still intact!
      Time to stalk!'

arachne_weaver:
  name: Arachne Weaver
  race: Beast
  level: 19
  base_hp: 110
