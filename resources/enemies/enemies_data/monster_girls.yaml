    house_bond_kiss: She plants a surprisingly tender kiss. 'Now you are my arena.'
    house_recruit_again: She stamps her foot, ready. 'The arena calls! Let us fight again!'

vampire_matriarch:
  name: Vampire Matriarch
  race: Vampire
  level: 25
  base_hp: 140
  mods:
    Dexterity: 4
    Charisma: 4
    Constitution: 2
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} cradles a porcelain doll, her gaze ancient and unreadable. 'My children are many. What makes you think I need one more? Prove your worth, fledgling.'
    recruit_accepted: The {name} opens her arms, maternal and terrifying all at once. 'Come, my new child. I shall give you the dark gift of my fangs — and my eternal protection.'
    capture: The {name} opens her arms, ancient and inviting. 'Come, {player}. I have waited long for one like you.'
    house_talk_low: She cradles the doll, indifferent. 'You are not my child. Do not bother me.'
    house_talk_mid: She sets down the doll, giving you a faint smile. 'You have potential. Tell me of your lineage.'
    house_talk_high: She takes your hand, her touch maternal. 'You have earned my care. I will protect you.'
    house_talk_max: She holds you as a mother would. 'You are my greatest child. I love you.'
    house_gift_love: She accepts it with a soft smile. 'A thoughtful gift. You are learning.'
    house_gift_hate: She pushes it away, disappointed. 'This is not how you honour a matriarch.'
    house_buff: She whispers a blessing of blood and shadow. 'May you never hunger and always prevail.'
    house_bond_kiss: She kisses your forehead, a mark of belonging. 'Now you are truly mine.'
    house_recruit_again: She rises, ancient and powerful. 'Come, my child. We have much to do.'

centaur_champion:
  name: Centaur Champion
  race: Beast
  level: 26
  base_hp: 195
  mods:
    Strength: 4
    Dexterity: 4
    Charisma: 3
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} adjusts her armor, eyes fierce. 'I am a champion of my people. I will not follow a leader who cannot keep pace with my hooves.'
    recruit_accepted: The {name} bows her head, mane flowing like silk. 'You run with the heart of a champion. I will charge at your side — through fire, through storm, through oblivion.'
    capture: The {name} stamps her hoof, then bows deeply. 'A champion yields to a greater champion, {player}. Ride with me.'
    house_talk_low: She prances restlessly. 'You are slow. I have no time for dawdlers.'
    house_talk_mid: She circles you, a spark of interest. 'You are faster than you look. Tell me of your home.'
    house_talk_high: She offers you her hand. 'You are a true rider. Let us race!'
    house_talk_max: She rests her head against yours. 'You are my champion. I will follow you anywhere.'
    house_gift_love: She lifts it with a joyful neigh. 'A gift worthy of a champion! I am proud!'
    house_gift_hate: She snorts, unimpressed. 'This is not fit for a warrior.'
    house_buff: She stamps, and you feel a burst of speed. 'Now you run like the wind!'
    house_bond_kiss: She kisses you, mane brushing your face. 'Now you are my herd.'
    house_recruit_again: She tosses her mane, ready to charge. 'Let us ride to glory again!'

infernal_empress:
  name: Infernal Empress
  race: Demon
  level: 26
  base_hp: 290
  mods:
    Strength: 5
    Charisma: 6
    Dexterity: 3
  boss: true
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} sits on a throne of molten bone, eyes burning. 'Mortals are ash. Demons are smoke. Why should I bind myself to either? Amuse me, or burn.'
    recruit_accepted: The {name} rises, hellfire curling around her like a gown. 'You are the spark that did not die in my furnace. Rule the abyss with me — I am tired of ruling alone.'
    capture: The {name} steps down from her throne, hellfire dimming to candlelight. 'You conquered the abyss, {player}. Now... conquer me.'
    house_talk_low: She lounges on her throne, unimpressed. 'You are a gnat. Swat yourself away.'
    house_talk_mid: She leans forward, a flicker of interest. 'You are not entirely boring. Speak.'
    house_talk_high: She descends to your level, fire warm. 'You have earned my attention. Let us converse.'
    house_talk_max: She takes you in her arms, fire soft. 'You are my equal. I love you.'
    house_gift_love: She accepts it, and it glows with her fire. 'A gift fit for an empress. You please me.'
    house_gift_hate: She incinerates it. 'Trash. Do not waste my time.'
    house_buff: She breathes a wave of power over you. 'May you burn bright and never be extinguished.'
    house_bond_kiss: She kisses you, and you taste the inferno. 'Now you are my consort in hell.'
    house_recruit_again: She rises, hellfire roaring. 'The abyss awaits. Let us rule together.'

scylla_wrecker:
  name: Scylla Wrecker
  race: Abomination
  level: 26
  base_hp: 180
  mods:
    Strength: 5
    Constitution: 4
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name}'s many tentacles writhe restlessly, eyes gleaming from the depths. 'I am the deep. You are the surface. We do not mix, little bubble.'
    recruit_accepted: The {name} wraps a tentacle gently around your ankle, pulling you closer to her cold embrace. 'You dived where others drowned. I shall drag your enemies to the abyss.'
    capture: The {name} wraps a tentacle around your wrist, pulling you toward the depths. 'You dived where others feared, {player}. I will not let you sink.'
    house_talk_low: She lurks in the shadows of the room. 'You are dry. I do not like dry.'
    house_talk_mid: She extends a tentacle, dripping. 'You are curious. Touch me if you dare.'
    house_talk_high: She wraps a tentacle around your waist, pulling you close. 'You are my favourite surface‑dweller. Stay with me.'
    house_talk_max: She holds you in a nest of tentacles, her voice soft. 'You are my treasure from the depths. I love you.'
    house_gift_love: She takes it, coiling around it. 'It is wet and shiny. I love it!'
    house_gift_hate: She lets it sink into the floor. 'It is dry and dead. Remove it.'
    house_buff: She spouts a spray of brine over you. 'May you breathe deep and never drown.'
    house_bond_kiss: She kisses you, tasting of salt and the deep. 'Now you are of the abyss.'
    house_recruit_again: She rises, tentacles waving. 'The depths miss you. Let us dive again.'

gorgon_petrifier:
  name: Gorgon Petrifier
  race: Lizardfolk
  level: 28
  base_hp: 175
  mods:
    Dexterity: 3
    Charisma: 4
    Wisdom: 3
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} adjusts her veil, snakes hissing a warning. 'One look and you are stone. One word and you are dust. Why would I trade solitude for a fragile mortal?'
    recruit_accepted: The {name} lifts her veil, and for the first time her eyes hold no threat — only wonder. 'You did not turn to stone. You are my first... my only... safe place.'
    capture: The {name} lifts her veil slowly, snakes hissing softly. 'You did not turn away. You did not turn to stone. You are... my first, {player}.'
    house_talk_low: She keeps her veil down, snakes hissing. 'You are too bold. Look away.'
    house_talk_mid: She lifts the veil a fraction. 'You are not afraid? ...Interesting.'
    house_talk_high: She lets you touch her face, snakes still. 'You see me for who I am. I... like that.'
    house_talk_max: She holds you, veil discarded, snakes nuzzling you. 'You are my only safe harbor. I love you.'
    house_gift_love: She accepts it, and her snakes calm. 'A gift... I have never received one. Thank you.'
    house_gift_hate: She recoils, snakes hissing. 'It is a trap. Take it away.'
    house_buff: She whispers a petrification charm that hardens your resolve. 'May you be as unyielding as stone.'
    house_bond_kiss: She kisses you, and you feel no fear. 'Now you are safe from my gaze.'
    house_recruit_again: She lifts her veil, a smile on her face. 'I will walk with you again.'

ninetales_fox:
  name: Ninetales Fox
  race: Beast
  level: 30
  base_hp: 220
  mods:
    Charisma: 6
    Wisdom: 5
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} swishes her nine tails, flames dancing between them. 'I have lived a thousand years. You are but a blink. Return when you have become a story worth telling.'
    recruit_accepted: The {name} bows her head, all nine tails fanning out like a crown of fire. 'You are the chapter I never expected. I will guard your tale until the last page turns.'
    capture: The {name} bows, all nine tails fanning out. 'A thousand years I waited, {player}. You are the story I was meant to find.'
    house_talk_low: She fans her tails, uninterested. 'You are a page in a book I have already read.'
    house_talk_mid: She lets you touch a tail tip. 'You have some new lines. Tell me your story.'
    house_talk_high: She curls around you, tails warm. 'You are becoming a favourite chapter. Continue.'
    house_talk_max: She holds you, all nine tails cocooning you. 'You are my epic. I will guard you forever.'
    house_gift_love: She accepts it, tails flickering with joy. 'A gift for a legend? You are generous.'
    house_gift_hate: She sets it aside, unimpressed. 'It is not worthy of my tale.'
    house_buff: She breathes a wisp of flame that coils around you. 'May your story be filled with fire and glory.'
    house_bond_kiss: She kisses you, and you taste a thousand years. 'Now you are part of my legend.'
    house_recruit_again: She rises, nine tails blazing. 'I have waited long enough. Let us write the next chapter.'

mermaid_siren_queen:
  name: Mermaid Siren Queen
  race: Fey
  level: 31
  base_hp: 200
  mods:
    Charisma: 6
    Wisdom: 4
    Learning: 3
  boss: true
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} sinks beneath the waves, her voice rising like a warning. 'The tide does not answer to shore-dwellers. Learn the language of the deep, or drown trying.'
    recruit_accepted: The {name} rises from the water, taking your hand in her webbed fingers. 'You are the current I would follow to any shore. My song is yours — my ocean, my heart.'
    capture: The {name} sings a soft melody as she allows herself to be captured.
    house_talk_low: She stays in a pool of water, distant. 'You are dry. I do not like dry.'
    house_talk_mid: She lets you touch her tail. 'You are gentle. Tell me of your sea?'
    house_talk_high: She rises to sit beside you, her voice melodic. 'You have become a part of my tide.'
    house_talk_max: She wraps her arms around you, her song soft. 'You are my shore. I will always return.'
    house_gift_love: She takes it, a bright trill. 'It is beautiful! I will keep it in my grotto!'
    house_gift_hate: She pushes it away, sad. 'It does not belong beneath the waves.'
    house_buff: She sings a note that fills you with calm. 'May the sea always carry you safely.'
    house_bond_kiss: She kisses you, tasting of salt and song. 'Now you are part of my ocean.'
    house_recruit_again: She surfaces, smiling. 'I heard your call. Let us sail together.'

draconic_valkyrie:
  name: Draconic Valkyrie
  race: Dragonkin
  level: 33
  base_hp: 225
  mods:
    Strength: 5
    Constitution: 4
    Charisma: 3
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} spreads her wings, scales gleaming like armor. 'I am dragon and valkyrie both. I choose who lives and dies. You have not earned my judgment yet.'
    recruit_accepted: The {name} beats her wings in a thunderclap of approval, landing before you. 'You are worthy of the halls of glory! I will carry you to victory on dragon-wings!'
    capture: The {name} folds her wings, spear resting at her side. 'You have earned the judgment of dragon and valkyrie, {player}. I choose life... with you.'
    house_talk_low: She stands rigid, wings half‑spread. 'You are unproven. Speak.'
    house_talk_mid: She relaxes, a glint in her eye. 'You are not worthless. Tell me of your battles.'
    house_talk_high: She sits beside you, wings curving around you. 'You are a worthy warrior. I would fight beside you.'
    house_talk_max: She wraps you in her wings, her voice soft. 'You are my glory. I love you.'
    house_gift_love: She holds it high, scales glinting. 'A gift for a valkyrie! I accept!'
    house_gift_hate: She drops it, unimpressed. 'It is not worthy of a dragon.'
    house_buff: She roars, and you feel invincible. 'May you earn a place in the halls of the slain.'
    house_bond_kiss: She kisses you, and you taste sky and fire. 'Now you are my chosen.'
    house_recruit_again: She spreads her wings, spear ready. 'Valhalla awaits! Let us ride!'

sphinx_riddler:
  name: Sphinx Riddler
  race: Beast
  level: 34
  base_hp: 210
  mods:
    Learning: 5
    Wisdom: 4
    Dexterity: 2
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: 'The {name} taps her chin, tail flicking. ''Riddle me this: what walks on your hopes but has no weight? You. You are too light to carry my loyalty. Try again.'''
    recruit_accepted: The {name}'s eyes shine with delight, purring like a satisfied cat. 'You answered the riddle of my heart. I will be the wisdom at your side — ask, and I shall know.'
    capture: The {name} purrs, tail flicking. 'The answer to the riddle was you all along, {player}. Clever mortal.'
    house_talk_low: She lounges, tail flicking. 'You are too simple for my riddles. Leave.'
    house_talk_mid: She offers you a riddle. 'Solve this, and I will talk.'
    house_talk_high: She purrs, pleased. 'You have solved many. You are worthy of my company.'
    house_talk_max: She curls against you, her voice a purr. 'You are the answer to my oldest riddle. I love you.'
    house_gift_love: She takes it, a smile on her face. 'A gift wrapped in a puzzle? You know me well.'
    house_gift_hate: She sets it aside, unimpressed. 'It is too obvious. I need mystery.'
    house_buff: She whispers a riddle that unlocks your mind. 'May your thoughts be sharp and your words true.'
    house_bond_kiss: She kisses you, and you feel the answer to all questions. 'Now you know my heart.'
    house_recruit_again: She stretches, a new riddle on her lips. 'I missed you. Let us solve the world together.'

lich_queen_avatar:
  name: Lich Queen Avatar
  race: Undead
  level: 35
  base_hp: 195
  mods:
    Learning: 6
    Charisma: 3
  boss: false
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} turns a page in a tome that writes itself, not looking up. 'I have outlived empires. You are a footnote. Return when you are a chapter worth studying.'
    recruit_accepted: The {name} closes her book, phylactery glowing between her ribs. 'You are the only variable my equations cannot solve. Fascinating. I will follow you... to compute your destiny.'
    capture: The {name} closes her tome, phylactery pulsing. 'You have solved the equation of my heart, {player}. Fascinating... and terrifying.'
    house_talk_low: She reads, ignoring you. 'You are a distraction. Leave.'
    house_talk_mid: She glances up, a flicker of interest. 'You are less distracting than most. Speak.'
    house_talk_high: She closes the book, giving you her full attention. 'You are a fascinating variable. Let me study you.'
    house_talk_max: She takes your hand, her phylactery warm. 'You are the equation I never solved. I love you.'
    house_gift_love: She examines it with academic delight. 'A rare artifact! I will study it for centuries.'
    house_gift_hate: She returns it, bored. 'It is mundane. I already have a thousand like it.'
    house_buff: She inscribes a rune on your skin. 'May your intellect never falter.'
    house_bond_kiss: She kisses you, and you feel infinite knowledge. 'Now you are my eternal thesis.'
    house_recruit_again: She closes her book, phylactery glowing. 'I have new data. Let us test it together.'

valkyrie_commander:
  name: Valkyrie Commander
  race: Human
  level: 36
  base_hp: 260
  mods:
    Strength: 5
    Dexterity: 5
    Charisma: 4
  boss: true
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} grips her spear, eyes hard as tempered steel. 'I have escorted the bravest to Valhalla. You are not yet among them. Fight harder. Live bolder.'
    recruit_accepted: The {name} kneels with her spear across her lap, a warrior's deepest vow. 'You are the legend I would sing of in the halls of the slain. I will follow you to Ragnarok and back.'
    capture: The proud {name} kneels with respect. 'You have bested me... I yield.'
    house_talk_low: She stands at attention, spear ready. 'You are not a commander. State your business.'
    house_talk_mid: She lowers her spear slightly. 'You have some command presence. Tell me of your battles.'
    house_talk_high: She offers you a seat. 'You are a true leader. I would follow you.'
    house_talk_max: She kneels, spear laid at your feet. 'You are my Valhalla. I love you.'
    house_gift_love: She accepts it with a warrior's nod. 'A gift worthy of a valkyrie. I am honoured.'
    house_gift_hate: She returns it, unimpressed. 'It is not fit for battle.'
    house_buff: She intones a battle blessing. 'May your strikes be true and your shield unbreakable.'
    house_bond_kiss: She kisses you with fierce passion. 'Now you are my fallen hero.'
    house_recruit_again: She rises, spear gleaming. 'The battlefield calls! Let us ride!'

dragon_goddess_avatar:
  name: Dragon Goddess Avatar
  race: Dragonkin
  level: 37
  base_hp: 440
  mods:
    Strength: 6
    Constitution: 5
    Charisma: 5
  boss: true
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} exhales a breath of starfire, indifferent. 'I am the breath of creation. You are a spark in the void. Do not waste my time with mortal whims.'
    recruit_accepted: The {name} lowers her massive head, starlight pooling in her eyes. 'You are the ember that refuses to die. I will burn the world for you — and build it anew from the ashes.'
    capture: The {name} lowers her massive head, starlight pooling. 'You caught a star, {player}. Do not drop it, little spark.'
    house_talk_low: She coils, immense and unapproachable. 'You are nothing. Do not presume.'
    house_talk_mid: She regards you with a glimmer of interest. 'You have a spark. Let us see if it kindles.'
    house_talk_high: She lowers her head to your level. 'You are worthy of my breath. Speak.'
    house_talk_max: She wraps you in her wing, gentle as a star. 'You are my constellation. I love you.'
    house_gift_love: She accepts it, and it glows with cosmic light. 'A gift for a goddess? You are bold. I like it.'
    house_gift_hate: She incinerates it. 'It is dust. Do not offer me dust.'
    house_buff: She breathes starlight over you. 'May you shine as bright as the cosmos.'
    house_bond_kiss: She kisses you, and you taste galaxies. 'Now you are my eternal flame.'
    house_recruit_again: She rises, wings spanning the sky. 'The stars are aligned. Let us reshape the world.'

arachne_brood_queen:
  name: Arachne Brood Queen
  race: Beast
  level: 38
  base_hp: 310
  mods:
    Dexterity: 6
    Strength: 4
    Constitution: 5
  boss: true
  super_boss: false
  monster_girl: true
  dialogue:
    recruit_denied: The {name} tends to a cocoon of writhing silk, not sparing you a glance. 'My brood is countless. My patience is not. You are not yet worthy to walk my web.'
    recruit_accepted: The {name} cradles your face in her many hands, silk soft as a mother's touch. 'You are the egg I never laid, the thread I never cut. I will weave victory around you.'
    capture: The {name} cradles you in her many arms, silk soft as a lullaby. 'You are the thread I never knew I needed, {player}.'
    house_talk_low: She works her web, ignoring you. 'You are a fly. Stay out of my web.'
    house_talk_mid: She pauses, giving you a glance. 'You are not a pest. Speak, but do not tangle.'
    house_talk_high: She sits with you, her many hands gentle. 'You are a fine thread. I would weave you into my family.'
    house_talk_max: She envelops you in silk and love. 'You are my brood-mate. I love you.'
    house_gift_love: She takes it, weaving it into her web. 'A gift for the queen? You are wise.'
    house_gift_hate: She cuts it away. 'It is coarse. It does not belong.'
    house_buff: She wraps a silk blessing around you. 'May you never be trapped, and always ensnare your foes.'
    house_bond_kiss: She kisses you, silk soft. 'Now you are part of my brood.'
    house_recruit_again: She rises, her brood stirring. 'My web is ready. Let us hunt together.'

cosmic_slime_empress:
  name: Cosmic Slime Empress
  race: Elemental
  level: 40
  base_hp: 480
  mods:
    Constitution: 8
    Learning: 6
    Charisma: 5
  boss: true
  monster_girl: true
  super_boss: false
  dialogue:
    recruit_denied: The {name} ripples with the colors of distant galaxies, indifferent. 'I am the space between stars. You are a grain on a speck. Return when you are a constellation.'
    recruit_accepted: The {name} envelops you in a cosmic embrace — cool, infinite, and warm all at once. 'You are the gravity I did not expect. I will orbit you until the universe ends... and after.'
    capture: The {name} envelops you in galaxies, cool and infinite. 'You are the gravity I have been drifting toward, {player}. Welcome home.'
    house_talk_low: She drifts, formless. 'You are too small. I cannot perceive you.'
    house_talk_mid: She coalesces into a humanoid shape, curious. 'You are a tiny miracle. Tell me of your world.'
    house_talk_high: She wraps a tendril around you, stars within. 'You have become a galaxy to me. Stay.'
    house_talk_max: She holds you in her cosmic form, infinite love. 'You are the center of my universe. I love you.'
    house_gift_love: She absorbs it, and it glows with new colors. 'A gift from a mortal? It is precious.'
    house_gift_hate: She lets it drift away. 'It is not of the cosmos. I cannot accept.'
    house_buff: She imbues you with stardust. 'May you traverse the void and never lose your way.'
    house_bond_kiss: She kisses you, and you feel the birth of stars. 'Now you are eternal.'
    house_recruit_again: She ripples, galaxies swirling. 'The universe calls. Let us journey together.'

