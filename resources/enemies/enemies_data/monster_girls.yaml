    ascension_post_ceremony: The {stone} detonates into a nova of hellfire that crowns
      {name}. Her wings burst into existence. 'The abyss acknowledges a new order!
      Level {old_cap} is incinerated.'
    is_defeated: Her flames gutter to mere smoke as she leans on her throne. 'An empress...
      brought low... impossible...'
    is_recovered: She ignites with a roar of hellfire. 'Impossible is just a word.
      The Infernal Empress rises!'

scylla_wrecker:
