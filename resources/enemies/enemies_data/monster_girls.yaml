    ascension_post_ceremony: The {stone} splits into a whirlpool of bioluminescence!
      {name}'s tentacles grow longer, shimmering with deep magic. 'The ocean is mine!
      Level {old_cap} drowned.'
    is_defeated: She sinks into a shallow pool, tentacles limp. 'Too dry... can't...
      move...'
    is_recovered: She surges out of the water, tentacles thrashing with new life.
